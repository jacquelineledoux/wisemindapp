<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiseMind - DBT Skills Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @media print {
            body * {
                visibility: hidden;
            }
            #printable-content, #printable-content * {
                visibility: visible;
            }
            #printable-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            
            .no-print {
                display: none !important;
            }
            
            * {
                overflow: visible !important;
                max-height: none !important;
            }
        }
        
        .printing-active {
            overflow: visible !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // ==================== DATA STORE ====================
        
        const DBT_MODULES = [
          'Mindfulness',
          'Distress Tolerance',
          'Emotion Regulation',
          'Interpersonal Effectiveness'
        ];

        const SKILL_DEFINITIONS = {
          'Mindfulness': [
            'Wise Mind', 'Observe', 'Describe', 'Participate',
            'Non-Judgmental Stance', 'One-Mindfully', 'Effectiveness'
          ],
          'Distress Tolerance': [
            'STOP', 'TIPP', 'Paced Breathing', 'Grounding (5-4-3-2-1)',
            'Self-Soothe with Senses', 'ACCEPTS', 'IMPROVE the Moment',
            'Radical Acceptance', 'Pros and Cons', 'Willingness'
          ],
          'Emotion Regulation': [
            'Identify & Label Emotions', 'Check the Facts', 'Opposite Action',
            'Problem Solving', 'ABC PLEASE', 'Build Positive Experiences'
          ],
          'Interpersonal Effectiveness': [
            'DEAR MAN', 'GIVE', 'FAST', 'Validation',
            'Managing Conflict', 'Setting Boundaries'
          ]
        };

        const DataStore = {
          getUsers: () => {
            const users = localStorage.getItem('dbt_users');
            return users ? JSON.parse(users) : [];
          },

          getUser: (userId) => {
            const users = DataStore.getUsers();
            return users.find(u => u.id === userId);
          },

          getUserByEmail: (email) => {
            const users = DataStore.getUsers();
            return users.find(u => u.email.toLowerCase() === email.toLowerCase());
          },

          addUser: (user) => {
            const users = DataStore.getUsers();
            users.push(user);
            localStorage.setItem('dbt_users', JSON.stringify(users));
          },

          updateUser: (userId, updates) => {
            const users = DataStore.getUsers();
            const index = users.findIndex(u => u.id === userId);
            if (index !== -1) {
              users[index] = { ...users[index], ...updates, updatedAt: Date.now() };
              localStorage.setItem('dbt_users', JSON.stringify(users));
              return users[index];
            }
            return null;
          },

          deleteUser: (userId) => {
            const users = DataStore.getUsers();
            const filtered = users.filter(u => u.id !== userId);
            localStorage.setItem('dbt_users', JSON.stringify(filtered));
            
            localStorage.removeItem(`dbt_skills_${userId}`);
            localStorage.removeItem(`dbt_worksheets_${userId}`);
            localStorage.removeItem(`dbt_safety_plan_${userId}`);
            localStorage.removeItem(`dbt_vulnerability_${userId}`);
            localStorage.removeItem(`dbt_badges_${userId}`);
            localStorage.removeItem(`dbt_views_${userId}`);
          },

          getSkillEntries: (userId) => {
            const key = `dbt_skills_${userId}`;
            const entries = localStorage.getItem(key);
            return entries ? JSON.parse(entries) : [];
          },

          addSkillEntry: (entry) => {
            const key = `dbt_skills_${entry.userId}`;
            const entries = DataStore.getSkillEntries(entry.userId);
            entries.push(entry);
            localStorage.setItem(key, JSON.stringify(entries));
          },

          deleteSkillEntry: (userId, entryId) => {
            const key = `dbt_skills_${userId}`;
            const entries = DataStore.getSkillEntries(userId);
            const filtered = entries.filter(e => e.id !== entryId);
            localStorage.setItem(key, JSON.stringify(filtered));
          },

          getSafetyPlan: (userId) => {
            const key = `dbt_safety_plan_${userId}`;
            const plan = localStorage.getItem(key);
            return plan ? JSON.parse(plan) : null;
          },

          saveSafetyPlan: (plan) => {
            const key = `dbt_safety_plan_${plan.userId}`;
            localStorage.setItem(key, JSON.stringify(plan));
          },

          exportUserData: (userId) => {
            return {
              version: '1.9.3',
              exportDate: new Date().toISOString(),
              user: DataStore.getUser(userId),
              skillEntries: DataStore.getSkillEntries(userId),
              safetyPlan: DataStore.getSafetyPlan(userId)
            };
          }
        };

        window.DataStore = DataStore;
        window.DBT_MODULES = DBT_MODULES;
        window.SKILL_DEFINITIONS = SKILL_DEFINITIONS;

        // ==================== AUTH CONTEXT ====================

        const AuthContext = createContext();

        const useAuth = () => {
          const context = useContext(AuthContext);
          if (!context) {
            throw new Error('useAuth must be used within AuthProvider');
          }
          return context;
        };

        const AuthProvider = ({ children }) => {
          const [currentUser, setCurrentUser] = useState(null);
          const [currentView, setCurrentView] = useState('home');
          const [viewData, setViewData] = useState(null);
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            const sessionUser = localStorage.getItem('dbt_current_user');
            if (sessionUser) {
              const user = JSON.parse(sessionUser);
              setCurrentUser(user);
            }
            setLoading(false);
          }, []);

          const login = (user) => {
            setCurrentUser(user);
            localStorage.setItem('dbt_current_user', JSON.stringify(user));
          };

          const logout = () => {
            setCurrentUser(null);
            localStorage.removeItem('dbt_current_user');
            setCurrentView('home');
            setViewData(null);
          };

          const onNavigate = (view, data = null) => {
            setCurrentView(view);
            setViewData(data);
            window.scrollTo(0, 0);
          };

          const value = {
            currentUser,
            currentView,
            viewData,
            login,
            logout,
            onNavigate,
            loading
          };

          if (loading) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-50 to-blue-50">
                <div className="text-center">
                  <div className="text-6xl mb-4">🧘</div>
                  <div className="text-2xl font-bold text-gray-700">Loading WiseMind...</div>
                </div>
              </div>
            );
          }

          return (
            <AuthContext.Provider value={value}>
              {children}
            </AuthContext.Provider>
          );
        };

        window.useAuth = useAuth;

        // ==================== AUTH SCREEN ====================

        const EnhancedAuthScreen = () => {
          const { login } = useAuth();
          
          const [mode, setMode] = useState('login');
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [confirmPassword, setConfirmPassword] = useState('');
          const [name, setName] = useState('');
          const [error, setError] = useState('');
          const [loading, setLoading] = useState(false);
          const [showPassword, setShowPassword] = useState(false);
          const [agreedToPrivacy, setAgreedToPrivacy] = useState(false);

          const handleLogin = async (e) => {
            e.preventDefault();
            setError('');
            setLoading(true);

            try {
              const user = DataStore.getUserByEmail(email);
              
              if (!user) {
                setError('No account found with this email');
                setLoading(false);
                return;
              }

              if (user.password !== password) {
                setError('Incorrect password');
                setLoading(false);
                return;
              }

              login(user);
            } catch (err) {
              setError('Login failed. Please try again.');
              setLoading(false);
            }
          };

          const handleSignup = async (e) => {
            e.preventDefault();
            setError('');

            if (!agreedToPrivacy) {
              setError('You must agree to the privacy notice to create an account');
              return;
            }

            if (!name || !email || !password) {
              setError('Please fill in all fields');
              return;
            }

            if (password.length < 8) {
              setError('Password must be at least 8 characters');
              return;
            }

            if (password !== confirmPassword) {
              setError('Passwords do not match');
              return;
            }

            setLoading(true);

            try {
              const existingUser = DataStore.getUserByEmail(email);
              
              if (existingUser) {
                setError('An account with this email already exists');
                setLoading(false);
                return;
              }

              const newUser = {
                id: Date.now().toString(),
                email: email,
                password: password,
                name: name,
                createdAt: Date.now(),
                updatedAt: Date.now()
              };

              DataStore.addUser(newUser);
              login(newUser);
            } catch (err) {
              setError('Signup failed. Please try again.');
              setLoading(false);
            }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                <div className="text-center mb-8">
                  <div className="text-6xl mb-4">🧘</div>
                  <h1 className="text-4xl font-bold mb-2 bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                    WiseMind
                  </h1>
                  <p className="text-gray-600">DBT Skills Tracker</p>
                </div>

                <div className="flex mb-6 bg-gray-100 rounded-lg p-1">
                  <button
                    onClick={() => { setMode('login'); setError(''); }}
                    className={`flex-1 py-2 rounded-lg font-semibold transition-all ${
                      mode === 'login' ? 'bg-white text-purple-600 shadow' : 'text-gray-600'
                    }`}
                  >
                    Login
                  </button>
                  <button
                    onClick={() => { setMode('signup'); setError(''); }}
                    className={`flex-1 py-2 rounded-lg font-semibold transition-all ${
                      mode === 'signup' ? 'bg-white text-purple-600 shadow' : 'text-gray-600'
                    }`}
                  >
                    Sign Up
                  </button>
                </div>

                {mode === 'login' ? (
                  <form onSubmit={handleLogin}>
                    <div className="mb-4">
                      <label className="block text-gray-700 font-semibold mb-2">Email</label>
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        required
                      />
                    </div>

                    <div className="mb-4">
                      <label className="block text-gray-700 font-semibold mb-2">Password</label>
                      <input
                        type={showPassword ? 'text' : 'password'}
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        required
                      />
                    </div>

                    {error && (
                      <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">
                        {error}
                      </div>
                    )}

                    <button
                      type="submit"
                      disabled={loading}
                      className="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-3 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all disabled:opacity-50"
                    >
                      {loading ? 'Logging in...' : 'Login'}
                    </button>
                  </form>
                ) : (
                  <form onSubmit={handleSignup}>
                    <div className="mb-4">
                      <label className="block text-gray-700 font-semibold mb-2">Name</label>
                      <input
                        type="text"
                        value={name}
                        onChange={(e) => setName(e.target.value)}
                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        required
                      />
                    </div>

                    <div className="mb-4">
                      <label className="block text-gray-700 font-semibold mb-2">Email</label>
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        required
                      />
                    </div>

                    <div className="mb-4">
                      <label className="block text-gray-700 font-semibold mb-2">Password</label>
                      <input
                        type={showPassword ? 'text' : 'password'}
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        required
                      />
                    </div>

                    <div className="mb-4">
                      <label className="block text-gray-700 font-semibold mb-2">Confirm Password</label>
                      <input
                        type={showPassword ? 'text' : 'password'}
                        value={confirmPassword}
                        onChange={(e) => setConfirmPassword(e.target.value)}
                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        required
                      />
                    </div>

                    <div className="mb-4">
                      <label className="flex items-start gap-2 cursor-pointer">
                        <input
                          type="checkbox"
                          checked={agreedToPrivacy}
                          onChange={(e) => setAgreedToPrivacy(e.target.checked)}
                          className="mt-1"
                        />
                        <span className="text-sm text-gray-700">
                          I understand that this app stores data locally on my device
                        </span>
                      </label>
                    </div>

                    {error && (
                      <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">
                        {error}
                      </div>
                    )}

                    <button
                      type="submit"
                      disabled={loading}
                      className="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-3 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all disabled:opacity-50"
                    >
                      {loading ? 'Creating Account...' : 'Sign Up'}
                    </button>
                  </form>
                )}

                <div className="mt-6 text-center text-sm text-gray-600">
                  <p>🔒 Your data stays on your device</p>
                  <p className="mt-1">No servers, no tracking, complete privacy</p>
                </div>
              </div>
            </div>
          );
        };

        // ==================== HOME COMPONENT ====================

        const Home = () => {
          const { currentUser, onNavigate } = useAuth();
          const [stats, setStats] = useState({
            totalSkills: 0,
            currentStreak: 0
          });

          useEffect(() => {
            if (currentUser) {
              const skillEntries = DataStore.getSkillEntries(currentUser.id);
              setStats({
                totalSkills: skillEntries.length,
                currentStreak: 0
              });
            }
          }, [currentUser]);

          const quickActions = [
            { id: 'skill-log', label: 'Log a Skill', icon: '📝', color: 'purple' },
            { id: 'learn', label: 'Learn Skills', icon: '📚', color: 'blue' },
            { id: 'safety-plan', label: 'Safety Plan', icon: '🔒', color: 'green' }
          ];

          return (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 p-6">
              <div className="max-w-6xl mx-auto">
                <div className="mb-8">
                  <h1 className="text-4xl font-bold text-gray-800 mb-2">
                    Welcome back, {currentUser.name || 'Friend'}! 👋
                  </h1>
                  <p className="text-xl text-gray-600">
                    Ready to practice your DBT skills today?
                  </p>
                </div>

                <div className="grid md:grid-cols-2 gap-4 mb-8">
                  <div className="bg-white rounded-xl p-6 shadow-md text-center">
                    <div className="text-4xl mb-2">📝</div>
                    <div className="text-3xl font-bold text-purple-600">{stats.totalSkills}</div>
                    <div className="text-gray-600 text-sm">Skills Logged</div>
                  </div>
                  <div className="bg-white rounded-xl p-6 shadow-md text-center">
                    <div className="text-4xl mb-2">🔥</div>
                    <div className="text-3xl font-bold text-orange-600">{stats.currentStreak}</div>
                    <div className="text-gray-600 text-sm">Day Streak</div>
                  </div>
                </div>

                <div className="bg-white rounded-xl p-8 shadow-lg mb-8">
                  <h2 className="text-2xl font-bold text-gray-800 mb-6">Quick Actions</h2>
                  <div className="grid md:grid-cols-3 gap-4">
                    {quickActions.map((action) => (
                      <button
                        key={action.id}
                        onClick={() => onNavigate(action.id)}
                        className={`bg-gradient-to-br from-${action.color}-50 to-${action.color}-100 border-2 border-${action.color}-300 rounded-xl p-6 hover:shadow-lg transition-all transform hover:scale-105`}
                      >
                        <div className="text-5xl mb-3">{action.icon}</div>
                        <div className="font-semibold text-gray-800">{action.label}</div>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="bg-gradient-to-r from-purple-500 to-blue-500 rounded-xl p-8 text-white shadow-lg">
                  <h2 className="text-2xl font-bold mb-3 flex items-center gap-2">
                    <span>💡</span> Today's Reminder
                  </h2>
                  <p className="text-lg opacity-95">
                    "You don't have to use skills perfectly. You just have to use them. Progress, not perfection."
                  </p>
                </div>
              </div>
            </div>
          );
        };

        // ==================== SKILL LOG ====================

        const SkillLog = () => {
          const { currentUser } = useAuth();
          const [view, setView] = useState('list');
          const [entries, setEntries] = useState([]);
          const [formData, setFormData] = useState({
            date: new Date().toISOString().split('T')[0],
            module: '',
            skill: '',
            emotionBefore: 5,
            emotionAfter: 5,
            trigger: '',
            notes: '',
            helpfulness: 3
          });

          useEffect(() => {
            if (currentUser) {
              loadEntries();
            }
          }, [currentUser]);

          const loadEntries = () => {
            if (!currentUser) return;
            const allEntries = DataStore.getSkillEntries(currentUser.id);
            setEntries(allEntries.sort((a, b) => new Date(b.date) - new Date(a.date)));
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const entry = {
              id: Date.now().toString(),
              userId: currentUser.id,
              ...formData,
              createdAt: Date.now()
            };

            DataStore.addSkillEntry(entry);
            loadEntries();
            setView('list');
            setFormData({
              date: new Date().toISOString().split('T')[0],
              module: '',
              skill: '',
              emotionBefore: 5,
              emotionAfter: 5,
              trigger: '',
              notes: '',
              helpfulness: 3
            });
          };

          const handleDelete = (id) => {
            if (confirm('Delete this entry?')) {
              DataStore.deleteSkillEntry(currentUser.id, id);
              loadEntries();
            }
          };

          if (view === 'create') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 p-6">
                <div className="max-w-3xl mx-auto">
                  <button
                    onClick={() => setView('list')}
                    className="mb-6 flex items-center gap-2 text-gray-600 hover:text-gray-900"
                  >
                    <span className="text-xl">←</span>
                    <span>Back</span>
                  </button>

                  <div className="bg-white rounded-xl p-8 shadow-lg">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800">Log a Skill</h2>

                    <form onSubmit={handleSubmit} className="space-y-6">
                      <div>
                        <label className="block text-gray-700 font-semibold mb-2">Date</label>
                        <input
                          type="date"
                          value={formData.date}
                          onChange={(e) => setFormData({...formData, date: e.target.value})}
                          className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                          required
                        />
                      </div>

                      <div>
                        <label className="block text-gray-700 font-semibold mb-2">DBT Module</label>
                        <select
                          value={formData.module}
                          onChange={(e) => setFormData({...formData, module: e.target.value, skill: ''})}
                          className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                          required
                        >
                          <option value="">Select a module...</option>
                          {DBT_MODULES.map(module => (
                            <option key={module} value={module}>{module}</option>
                          ))}
                        </select>
                      </div>

                      {formData.module && (
                        <div>
                          <label className="block text-gray-700 font-semibold mb-2">Skill Used</label>
                          <select
                            value={formData.skill}
                            onChange={(e) => setFormData({...formData, skill: e.target.value})}
                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            required
                          >
                            <option value="">Select a skill...</option>
                            {SKILL_DEFINITIONS[formData.module]?.map(skill => (
                              <option key={skill} value={skill}>{skill}</option>
                            ))}
                          </select>
                        </div>
                      )}

                      <div>
                        <label className="block text-gray-700 font-semibold mb-2">
                          Emotion Before: {formData.emotionBefore}/10
                        </label>
                        <input
                          type="range"
                          min="0"
                          max="10"
                          value={formData.emotionBefore}
                          onChange={(e) => setFormData({...formData, emotionBefore: parseInt(e.target.value)})}
                          className="w-full"
                        />
                      </div>

                      <div>
                        <label className="block text-gray-700 font-semibold mb-2">
                          Emotion After: {formData.emotionAfter}/10
                        </label>
                        <input
                          type="range"
                          min="0"
                          max="10"
                          value={formData.emotionAfter}
                          onChange={(e) => setFormData({...formData, emotionAfter: parseInt(e.target.value)})}
                          className="w-full"
                        />
                      </div>

                      <div>
                        <label className="block text-gray-700 font-semibold mb-2">Trigger (Optional)</label>
                        <textarea
                          value={formData.trigger}
                          onChange={(e) => setFormData({...formData, trigger: e.target.value})}
                          className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 resize-none"
                          rows="2"
                          placeholder="What prompted you to use this skill?"
                        />
                      </div>

                      <div>
                        <label className="block text-gray-700 font-semibold mb-2">Notes (Optional)</label>
                        <textarea
                          value={formData.notes}
                          onChange={(e) => setFormData({...formData, notes: e.target.value})}
                          className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 resize-none"
                          rows="3"
                          placeholder="How did it go? What did you notice?"
                        />
                      </div>

                      <div>
                        <label className="block text-gray-700 font-semibold mb-2">
                          How helpful was this skill? {formData.helpfulness}/5
                        </label>
                        <div className="flex gap-2">
                          {[1, 2, 3, 4, 5].map(rating => (
                            <button
                              key={rating}
                              type="button"
                              onClick={() => setFormData({...formData, helpfulness: rating})}
                              className={`flex-1 py-3 rounded-lg border-2 transition-all ${
                                formData.helpfulness >= rating
                                  ? 'bg-yellow-400 border-yellow-500 text-white'
                                  : 'bg-gray-100 border-gray-300 text-gray-600'
                              }`}
                            >
                              ⭐
                            </button>
                          ))}
                        </div>
                      </div>

                      <button
                        type="submit"
                        className="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-4 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all shadow-lg"
                      >
                        Save Entry
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 p-6">
              <div className="max-w-6xl mx-auto">
                <div className="text-center mb-8">
                  <h1 className="text-5xl font-bold mb-3 bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                    Skill Log
                  </h1>
                  <p className="text-xl text-gray-600 mb-6">Track your DBT skill practice</p>
                  <button
                    onClick={() => setView('create')}
                    className="bg-gradient-to-r from-purple-500 to-blue-500 text-white px-8 py-4 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all shadow-lg text-lg"
                  >
                    + Log a Skill
                  </button>
                </div>

                {entries.length === 0 ? (
                  <div className="bg-white rounded-xl p-12 text-center shadow-md">
                    <div className="text-6xl mb-4">📝</div>
                    <h3 className="text-2xl font-semibold text-gray-700 mb-2">No skills logged yet</h3>
                    <p className="text-gray-500 mb-6">Start tracking your DBT skill practice!</p>
                    <button
                      onClick={() => setView('create')}
                      className="bg-gradient-to-r from-purple-500 to-blue-500 text-white px-6 py-3 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all"
                    >
                      Log Your First Skill
                    </button>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {entries.map((entry) => (
                      <div key={entry.id} className="bg-white rounded-xl p-6 shadow-md hover:shadow-lg transition-shadow">
                        <div className="flex items-start justify-between mb-4">
                          <div>
                            <h3 className="text-xl font-bold text-gray-800">{entry.skill}</h3>
                            <p className="text-sm text-gray-500">
                              {new Date(entry.date).toLocaleDateString()} • {entry.module}
                            </p>
                          </div>
                          <button
                            onClick={() => handleDelete(entry.id)}
                            className="text-red-600 hover:text-red-800 transition-colors"
                          >
                            🗑️
                          </button>
                        </div>

                        <div className="grid md:grid-cols-2 gap-4 mb-4">
                          <div className="bg-red-50 p-3 rounded-lg">
                            <div className="text-sm text-gray-600 mb-1">Emotion Before</div>
                            <div className="text-2xl font-bold text-red-600">{entry.emotionBefore}/10</div>
                          </div>
                          <div className="bg-green-50 p-3 rounded-lg">
                            <div className="text-sm text-gray-600 mb-1">Emotion After</div>
                            <div className="text-2xl font-bold text-green-600">{entry.emotionAfter}/10</div>
                          </div>
                        </div>

                        {entry.trigger && (
                          <div className="mb-3">
                            <span className="font-semibold text-gray-700">Trigger: </span>
                            <span className="text-gray-600">{entry.trigger}</span>
                          </div>
                        )}

                        {entry.notes && (
                          <div className="mb-3">
                            <span className="font-semibold text-gray-700">Notes: </span>
                            <span className="text-gray-600">{entry.notes}</span>
                          </div>
                        )}

                        <div className="flex items-center gap-2">
                          <span className="text-sm font-semibold text-gray-700">Helpfulness:</span>
                          <div className="flex">
                            {[1, 2, 3, 4, 5].map(star => (
                              <span key={star} className={star <= entry.helpfulness ? 'text-yellow-400' : 'text-gray-300'}>
                                ⭐
                              </span>
                            ))}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        };

        // ==================== LEARN COMPONENT (SIMPLIFIED) ====================

        const Learn = () => {
          const { onNavigate } = useAuth();

          return (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 p-6">
              <div className="max-w-7xl mx-auto">
                <div className="text-center mb-8">
                  <h1 className="text-5xl font-bold mb-3 bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                    Learn DBT Skills
                  </h1>
                  <p className="text-xl text-gray-600">
                    Master the skills that will change your life
                  </p>
                </div>

                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                  {Object.keys(SKILL_DEFINITIONS).map((module, index) => {
                    const colors = ['purple', 'red', 'blue', 'green'];
                    const icons = ['🧘', '🛡️', '💙', '🤝'];
                    return (
                      <div key={module} className="bg-white rounded-xl p-6 shadow-md hover:shadow-xl transition-all">
                        <div className="text-5xl mb-3 text-center">{icons[index]}</div>
                        <h3 className="text-xl font-bold text-gray-800 mb-3 text-center">{module}</h3>
                        <ul className="space-y-2">
                          {SKILL_DEFINITIONS[module].slice(0, 5).map(skill => (
                            <li key={skill} className="text-sm text-gray-600">• {skill}</li>
                          ))}
                          {SKILL_DEFINITIONS[module].length > 5 && (
                            <li className="text-sm text-gray-500 italic">
                              +{SKILL_DEFINITIONS[module].length - 5} more...
                            </li>
                          )}
                        </ul>
                      </div>
                    );
                  })}
                </div>

                <div className="mt-8 bg-white rounded-xl p-8 shadow-lg text-center">
                  <h2 className="text-2xl font-bold text-gray-800 mb-4">Ready to Practice?</h2>
                  <button
                    onClick={() => onNavigate('skill-log')}
                    className="bg-gradient-to-r from-purple-500 to-blue-500 text-white px-8 py-4 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all shadow-lg"
                  >
                    Log Your Skills
                  </button>
                </div>
              </div>
            </div>
          );
        };

        // ==================== SAFETY PLAN (SIMPLIFIED) ====================

        const SafetyPlan = () => {
          const { currentUser } = useAuth();
          const [plan, setPlan] = useState({
            warningSignsInternal: '',
            warningSignsExternal: '',
            copingStrategies: '',
            socialDistractions: '',
            peopleWhoCanHelp: '',
            professionalsToContact: '',
            environmentSafety: '',
            reasonsForLiving: ''
          });
          const [saveStatus, setSaveStatus] = useState('');

          useEffect(() => {
            if (currentUser) {
              const saved = DataStore.getSafetyPlan(currentUser.id);
              if (saved) {
                setPlan(saved);
              }
            }
          }, [currentUser]);

          const handleSave = () => {
            if (!currentUser) return;
            
            setSaveStatus('saving');
            const planWithMeta = {
              ...plan,
              userId: currentUser.id,
              updatedAt: Date.now()
            };
            
            DataStore.saveSafetyPlan(planWithMeta);
            setSaveStatus('saved');
            
            setTimeout(() => setSaveStatus(''), 3000);
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-red-50 via-white to-orange-50 p-6">
              <div className="max-w-4xl mx-auto">
                <div className="text-center mb-8">
                  <h1 className="text-5xl font-bold mb-3 bg-gradient-to-r from-red-600 to-orange-600 bg-clip-text text-transparent">
                    My Safety Plan
                  </h1>
                  <p className="text-xl text-gray-600 mb-6">
                    A plan to keep you safe during a crisis
                  </p>
                  
                  <div className="bg-red-100 border-l-4 border-red-500 rounded-lg p-4 mb-6">
                    <h3 className="font-bold text-red-800 mb-2 flex items-center justify-center gap-2">
                      <span>🆘</span> If You're in Crisis Right Now
                    </h3>
                    <div className="text-red-900 space-y-1">
                      <p><strong>Call 988</strong> - Suicide & Crisis Lifeline (24/7)</p>
                      <p><strong>Text HOME to 741741</strong> - Crisis Text Line</p>
                      <p><strong>Call 911</strong> - Emergency Services</p>
                    </div>
                  </div>

                  <button
                    onClick={handleSave}
                    className="bg-gradient-to-r from-green-500 to-emerald-500 text-white px-6 py-3 rounded-lg font-semibold hover:from-green-600 hover:to-emerald-600 transition-all shadow-md"
                  >
                    {saveStatus === 'saving' ? 'Saving...' : saveStatus === 'saved' ? '✓ Saved!' : 'Save Plan'}
                  </button>
                </div>

                <div className="bg-white rounded-xl p-6 mb-6 shadow-md">
                  <h2 className="text-2xl font-bold text-red-600 mb-3 flex items-center gap-2">
                    <span>⚠️</span> Step 1: Warning Signs
                  </h2>
                  
                  <div className="mb-4">
                    <label className="block text-gray-700 font-semibold mb-2">
                      Internal Warning Signs (thoughts, images, mood):
                    </label>
                    <textarea
                      value={plan.warningSignsInternal}
                      onChange={(e) => setPlan({...plan, warningSignsInternal: e.target.value})}
                      placeholder="Examples: Feeling hopeless, thinking 'I can't take this anymore'..."
                      className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 resize-none"
                      rows="4"
                    />
                  </div>

                  <div>
                    <label className="block text-gray-700 font-semibold mb-2">
                      External Warning Signs (situations, people, events):
                    </label>
                    <textarea
                      value={plan.warningSignsExternal}
                      onChange={(e) => setPlan({...plan, warningSignsExternal: e.target.value})}
                      placeholder="Examples: Arguments with family, being alone too long..."
                      className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 resize-none"
                      rows="4"
                    />
                  </div>
                </div>

                <div className="bg-white rounded-xl p-6 mb-6 shadow-md">
                  <h2 className="text-2xl font-bold text-orange-600 mb-3 flex items-center gap-2">
                    <span>🧘</span> Step 2: Coping Strategies
                  </h2>
                  
                  <textarea
                    value={plan.copingStrategies}
                    onChange={(e) => setPlan({...plan, copingStrategies: e.target.value})}
                    placeholder="Examples: Use TIPP skill, go for a walk, practice paced breathing..."
                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 resize-none"
                    rows="6"
                  />
                </div>

                <div className="bg-white rounded-xl p-6 mb-6 shadow-md">
                  <h2 className="text-2xl font-bold text-green-600 mb-3 flex items-center gap-2">
                    <span>🤝</span> Step 3: People Who Can Help
                  </h2>
                  
                  <textarea
                    value={plan.peopleWhoCanHelp}
                    onChange={(e) => setPlan({...plan, peopleWhoCanHelp: e.target.value})}
                    placeholder="Examples: Mom (555-1234), Best friend Alex (555-5678)..."
                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 resize-none"
                    rows="6"
                  />
                </div>

                <div className="bg-gradient-to-r from-pink-500 to-rose-500 rounded-xl p-8 text-white shadow-lg mb-8">
                  <h2 className="text-3xl font-bold mb-3 flex items-center gap-2">
                    <span>💖</span> My Reasons for Living
                  </h2>
                  
                  <textarea
                    value={plan.reasonsForLiving}
                    onChange={(e) => setPlan({...plan, reasonsForLiving: e.target.value})}
                    placeholder="Examples: My kids need me, my dog depends on me, I want to travel someday..."
                    className="w-full px-4 py-3 border-2 border-white/30 bg-white/20 text-white placeholder-white/60 rounded-lg resize-none"
                    rows="6"
                  />
                </div>
              </div>
            </div>
          );
        };

        // ==================== SETTINGS (SIMPLIFIED) ====================

        const Settings = () => {
          const { currentUser, logout, onNavigate } = useAuth();
          const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

          const handleExport = () => {
            const data = DataStore.exportUserData(currentUser.id);
            const jsonString = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wisemind_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          };

          const handleDeleteAccount = () => {
            if (confirm('Are you absolutely sure? This will delete ALL your data permanently.')) {
              DataStore.deleteUser(currentUser.id);
              logout();
            }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-blue-50 p-6">
              <div className="max-w-4xl mx-auto">
                <h1 className="text-5xl font-bold mb-8 bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                  Settings
                </h1>

                <div className="bg-white rounded-xl p-6 mb-6 shadow-md">
                  <h2 className="text-2xl font-bold text-gray-800 mb-4">Account</h2>
                  <p className="text-gray-700 mb-2">
                    <strong>Name:</strong> {currentUser.name}
                  </p>
                  <p className="text-gray-700">
                    <strong>Email:</strong> {currentUser.email}
                  </p>
                </div>

                <div className="bg-white rounded-xl p-6 mb-6 shadow-md">
                  <h2 className="text-2xl font-bold text-gray-800 mb-4">Data</h2>
                  <button
                    onClick={handleExport}
                    className="bg-blue-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-600 transition-all mb-4"
                  >
                    📥 Export My Data
                  </button>
                  <p className="text-sm text-gray-600">
                    Download a backup of all your data in JSON format
                  </p>
                </div>

                <div className="bg-white rounded-xl p-6 mb-6 shadow-md">
                  <h2 className="text-2xl font-bold text-gray-800 mb-4">About</h2>
                  <button
                    onClick={() => onNavigate('privacy-notice')}
                    className="text-blue-600 hover:underline mb-2 block"
                  >
                    Privacy Notice
                  </button>
                  <button
                    onClick={() => onNavigate('about-designer')}
                    className="text-blue-600 hover:underline block"
                  >
                    About This App
                  </button>
                  <p className="text-sm text-gray-500 mt-4">Version 1.9.3</p>
                </div>

                <div className="bg-red-50 border border-red-300 rounded-xl p-6">
                  <h2 className="text-2xl font-bold text-red-600 mb-4">Danger Zone</h2>
                  <button
                    onClick={() => setShowDeleteConfirm(true)}
                    className="bg-red-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-red-700 transition-all"
                  >
                    Delete Account
                  </button>
                  
                  {showDeleteConfirm && (
                    <div className="mt-4 p-4 bg-red-100 rounded-lg">
                      <p className="text-red-900 font-semibold mb-3">
                        Are you absolutely sure? This cannot be undone!
                      </p>
                      <div className="flex gap-3">
                        <button
                          onClick={handleDeleteAccount}
                          className="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700"
                        >
                          Yes, Delete Everything
                        </button>
                        <button
                          onClick={() => setShowDeleteConfirm(false)}
                          className="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400"
                        >
                          Cancel
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        // ==================== SIMPLE PAGES ====================

        const PrivacyNotice = () => {
          const { onNavigate } = useAuth();
          
          return (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 p-6">
              <div className="max-w-4xl mx-auto">
                <h1 className="text-5xl font-bold mb-8 bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                  Privacy Notice
                </h1>
                
                <div className="bg-white rounded-xl p-8 shadow-lg mb-6">
                  <h2 className="text-3xl font-bold text-purple-600 mb-4">Your Privacy Matters</h2>
                  <p className="text-gray-700 text-lg mb-4">
                    WiseMind is designed with your privacy as the top priority. All your data is stored locally on your device using browser storage. We never collect, transmit, or store any of your information on external servers.
                  </p>
                  <div className="bg-green-50 border-l-4 border-green-500 p-4 rounded-r-lg">
                    <p className="text-green-900 font-semibold">
                      ✓ All your data stays on YOUR device
                    </p>
                  </div>
                </div>

                <div className="text-center">
                  <button
                    onClick={() => onNavigate('home')}
                    className="bg-gradient-to-r from-purple-500 to-blue-500 text-white px-8 py-4 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all shadow-lg"
                  >
                    ← Back to App
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const AboutDesigner = () => {
          const { onNavigate } = useAuth();
          
          return (
            <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-pink-50 p-6">
              <div className="max-w-4xl mx-auto">
                <h1 className="text-5xl font-bold mb-8 bg-gradient-to-r from-indigo-600 to-pink-600 bg-clip-text text-transparent">
                  About This App
                </h1>
                
                <div className="bg-white rounded-xl p-8 shadow-lg mb-6">
                  <h2 className="text-3xl font-bold text-indigo-600 mb-4">Our Mission</h2>
                  <p className="text-gray-700 text-lg mb-4">
                    WiseMind was created to make DBT skills accessible, practical, and easy to use in daily life. This is a free, privacy-focused tool to help you learn, practice, and track DBT skills on your own terms.
                  </p>
                </div>

                <div className="bg-white rounded-xl p-8 shadow-lg mb-6">
                  <h2 className="text-2xl font-bold text-pink-600 mb-4">Version Information</h2>
                  <p className="text-gray-700"><strong>Current Version:</strong> 1.9.3</p>
                  <p className="text-gray-700"><strong>Release Date:</strong> January 2024</p>
                </div>

                <div className="text-center">
                  <button
                    onClick={() => onNavigate('home')}
                    className="bg-gradient-to-r from-indigo-500 to-pink-500 text-white px-8 py-4 rounded-lg font-semibold hover:from-indigo-600 hover:to-pink-600 transition-all shadow-lg"
                  >
                    ← Back to App
                  </button>
                </div>
              </div>
            </div>
          );
        };

        // ==================== MAIN APP ====================

        const App = () => {
          const { currentUser, currentView, onNavigate, logout } = useAuth();
          const [showMobileMenu, setShowMobileMenu] = useState(false);

          if (!currentUser) {
            return <EnhancedAuthScreen />;
          }

          const menuItems = [
            { id: 'home', label: 'Home', icon: '🏠' },
            { id: 'learn', label: 'Learn', icon: '📚' },
            { id: 'skill-log', label: 'Skill Log', icon: '📝' },
            { id: 'safety-plan', label: 'Safety Plan', icon: '🔒' },
            { id: 'settings', label: 'Settings', icon: '⚙️' }
          ];

          const renderView = () => {
            switch (currentView) {
              case 'home': return <Home />;
              case 'learn': return <Learn />;
              case 'skill-log': return <SkillLog />;
              case 'safety-plan': return <SafetyPlan />;
              case 'privacy-notice': return <PrivacyNotice />;
              case 'about-designer': return <AboutDesigner />;
              case 'settings': return <Settings />;
              default: return <Home />;
            }
          };

          return (
            <div className="min-h-screen bg-gray-50 flex">
              {/* Sidebar - Desktop */}
              <div className="hidden md:block w-64 bg-gradient-to-b from-purple-600 to-blue-600 text-white fixed h-full overflow-y-auto">
                <div className="p-6">
                  <h1 className="text-3xl font-bold mb-2">WiseMind</h1>
                  <p className="text-sm opacity-90">DBT Skills Tracker</p>
                  <div className="mt-4 text-xs opacity-75">
                    Hello, {currentUser.name || currentUser.email}
                  </div>
                </div>

                <nav className="px-3 pb-6">
                  {menuItems.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => {
                        onNavigate(item.id);
                        setShowMobileMenu(false);
                      }}
                      className={`w-full text-left px-4 py-3 rounded-lg mb-2 transition-all flex items-center gap-3 ${
                        currentView === item.id
                          ? 'bg-white text-purple-600 font-semibold shadow-lg'
                          : 'hover:bg-white/20'
                      }`}
                    >
                      <span className="text-xl">{item.icon}</span>
                      <span>{item.label}</span>
                    </button>
                  ))}

                  <div className="border-t border-white/20 my-4"></div>

                  <button
                    onClick={logout}
                    className="w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-3 hover:bg-white/20 text-white/90"
                  >
                    <span className="text-xl">🚪</span>
                    <span>Logout</span>
                  </button>
                </nav>
              </div>

              {/* Mobile Header */}
              <div className="md:hidden fixed top-0 left-0 right-0 bg-gradient-to-r from-purple-600 to-blue-600 text-white z-40 shadow-lg">
                <div className="flex items-center justify-between p-4">
                  <h1 className="text-2xl font-bold">WiseMind</h1>
                  <button
                    onClick={() => setShowMobileMenu(!showMobileMenu)}
                    className="text-3xl"
                  >
                    {showMobileMenu ? '✕' : '☰'}
                  </button>
                </div>
              </div>

              {/* Mobile Menu */}
              {showMobileMenu && (
                <div className="md:hidden fixed inset-0 bg-gradient-to-b from-purple-600 to-blue-600 text-white z-30 overflow-y-auto pt-20">
                  <div className="p-4">
                    <nav>
                      {menuItems.map((item) => (
                        <button
                          key={item.id}
                          onClick={() => {
                            onNavigate(item.id);
                            setShowMobileMenu(false);
                          }}
                          className={`w-full text-left px-4 py-4 rounded-lg mb-2 transition-all flex items-center gap-3 text-lg ${
                            currentView === item.id
                              ? 'bg-white text-purple-600 font-semibold shadow-lg'
                              : 'hover:bg-white/20'
                          }`}
                        >
                          <span className="text-2xl">{item.icon}</span>
                          <span>{item.label}</span>
                        </button>
                      ))}

                      <div className="border-t border-white/20 my-4"></div>

                      <button
                        onClick={() => {
                          logout();
                          setShowMobileMenu(false);
                        }}
                        className="w-full text-left px-4 py-4 rounded-lg transition-all flex items-center gap-3 text-lg hover:bg-white/20 text-white/90"
                      >
                        <span className="text-2xl">🚪</span>
                        <span>Logout</span>
                      </button>
                    </nav>
                  </div>
                </div>
              )}

              {/* Main Content */}
              <div className="flex-1 md:ml-64 mt-16 md:mt-0">
                {renderView()}
              </div>
            </div>
          );
        };

        // ==================== RENDER ====================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
          React.createElement(AuthProvider, null,
            React.createElement(App)
          )
        );
    </script>
</body>
</html>
