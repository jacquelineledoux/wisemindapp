<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiseMind - DBT Skills Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print {
      body * { visibility: hidden; }
      .print-content, .print-content * { visibility: visible; }
      .print-content { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-bounce { animation: bounce 1s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;

    // ==================== DATA DEFINITIONS ====================
    const DBT_MODULES = [
      { id: 'mindfulness', name: 'Mindfulness', icon: '🧘', color: 'from-purple-400 to-pink-400' },
      { id: 'distress', name: 'Distress Tolerance', icon: '🛡️', color: 'from-red-400 to-orange-400' },
      { id: 'emotion', name: 'Emotion Regulation', icon: '💙', color: 'from-blue-400 to-cyan-400' },
      { id: 'interpersonal', name: 'Interpersonal Effectiveness', icon: '🤝', color: 'from-green-400 to-teal-400' }
    ];

    const SKILL_DEFINITIONS = {
      'Mindfulness': ['Wise Mind', 'Observe', 'Describe', 'Participate', 'One-Mindfully', 'Non-Judgmentally', 'Effectively'],
      'Distress Tolerance': ['STOP', 'TIPP', 'Distract with ACCEPTS', 'Self-Soothe', 'IMPROVE', 'Pros and Cons', 'Radical Acceptance', 'Willingness'],
      'Emotion Regulation': ['Identify Emotions', 'Check the Facts', 'Opposite Action', 'Problem Solving', 'PLEASE', 'Build Mastery', 'Cope Ahead', 'Accumulate Positives'],
      'Interpersonal Effectiveness': ['DEAR MAN', 'GIVE', 'FAST', 'Validate', 'Boundaries']
    };

    const WORKSHEET_DEFINITIONS = [
      { id: 'chain-analysis', name: 'Chain Analysis', module: 'All Modules', icon: '🔗', color: 'bg-gradient-to-r from-purple-500 to-pink-500', description: 'Analyze problem behaviors to understand patterns', estimatedTime: '20-30 min', questions: [
        { id: 'q1', type: 'textarea', question: 'What was the problem behavior?', help: 'Be specific about what you did that you want to change' },
        { id: 'q2', type: 'textarea', question: 'What were the prompting events?', help: 'What happened right before? Environmental factors, interactions, thoughts?' },
        { id: 'q3', type: 'textarea', question: 'What vulnerability factors were present?', help: 'Were you tired, hungry, stressed, sick?' },
        { id: 'q4', type: 'textarea', question: 'Describe the chain of events', help: 'Step by step, what thoughts, feelings, actions led to the behavior?' },
        { id: 'q5', type: 'textarea', question: 'What were the consequences?', help: 'What happened after? Short-term and long-term effects?' },
        { id: 'q6', type: 'textarea', question: 'What skills could you use next time?', help: 'What DBT skills could interrupt this chain?' }
      ]},
      { id: 'diary-card', name: 'Diary Card', module: 'All Modules', icon: '📅', color: 'bg-gradient-to-r from-blue-500 to-cyan-500', description: 'Daily tracking of emotions, urges, and skills', estimatedTime: '5-10 min', questions: [
        { id: 'q1', type: 'rating', question: 'Rate your overall emotions today (0-10)', help: '0 = best possible, 10 = worst possible' },
        { id: 'q2', type: 'multiselect', question: 'Which emotions did you experience?', options: ['Happy', 'Sad', 'Angry', 'Anxious', 'Ashamed', 'Guilty', 'Lonely', 'Overwhelmed'] },
        { id: 'q3', type: 'rating', question: 'Rate urges to use target behaviors (0-10)', help: '0 = no urges, 10 = strongest urges' },
        { id: 'q4', type: 'checklist', question: 'Which skills did you practice today?', items: ['Mindfulness', 'Distress Tolerance', 'Emotion Regulation', 'Interpersonal Effectiveness'] },
        { id: 'q5', type: 'textarea', question: 'Notes about today', help: 'Anything else important to remember?' }
      ]},
      { id: 'opposite-action', name: 'Opposite Action', module: 'Emotion Regulation', icon: '🔄', color: 'bg-gradient-to-r from-green-500 to-teal-500', description: 'Change unwanted emotions by acting opposite', estimatedTime: '15 min', questions: [
        { id: 'q1', type: 'textarea', question: 'What emotion are you experiencing?', help: 'Name the emotion: sad, angry, anxious, etc.' },
        { id: 'q2', type: 'rating', question: 'How intense is this emotion? (0-10)' },
        { id: 'q3', type: 'textarea', question: 'What is the action urge?', help: 'What does this emotion make you want to do?' },
        { id: 'q4', type: 'textarea', question: 'Does this emotion fit the facts?', help: 'Is the emotion justified by the situation? Check the facts.' },
        { id: 'q5', type: 'textarea', question: 'What is the opposite action?', help: 'What action is opposite to your urge?' },
        { id: 'q6', type: 'textarea', question: 'How will you do opposite action ALL THE WAY?', help: 'Include body language, facial expression, posture' }
      ]},
      { id: 'dear-man', name: 'DEAR MAN', module: 'Interpersonal Effectiveness', icon: '💬', color: 'bg-gradient-to-r from-yellow-500 to-orange-500', description: 'Ask for what you need effectively', estimatedTime: '15 min', questions: [
        { id: 'q1', type: 'textarea', question: 'DESCRIBE: What is the situation?', help: 'Stick to the facts, no judgments' },
        { id: 'q2', type: 'textarea', question: 'EXPRESS: How do you feel?', help: 'Use "I feel..." statements' },
        { id: 'q3', type: 'textarea', question: 'ASSERT: What do you want/need?', help: 'Be clear and specific' },
        { id: 'q4', type: 'textarea', question: 'REINFORCE: Why should they help?', help: 'What\'s in it for them? Positive consequences?' },
        { id: 'q5', type: 'checklist', question: 'Plan to stay MINDFUL', items: ['Stay focused on goals', 'Ignore distractions', 'Use broken record if needed'] },
        { id: 'q6', type: 'checklist', question: 'Plan to APPEAR confident', items: ['Make eye contact', 'Use confident tone', 'Stand/sit upright'] },
        { id: 'q7', type: 'textarea', question: 'Plan to NEGOTIATE', help: 'What are you willing to compromise on?' }
      ]},
      { id: 'check-facts', name: 'Check the Facts', module: 'Emotion Regulation', icon: '🔍', color: 'bg-gradient-to-r from-indigo-500 to-purple-500', description: 'Question your assumptions and interpretations', estimatedTime: '15 min', questions: [
        { id: 'q1', type: 'textarea', question: 'What is the emotion?', help: 'Name it: angry, sad, afraid, etc.' },
        { id: 'q2', type: 'textarea', question: 'What is the prompting event?', help: 'What happened? Stick to observable facts only.' },
        { id: 'q3', type: 'textarea', question: 'What are your interpretations?', help: 'What story are you telling yourself about this event?' },
        { id: 'q4', type: 'textarea', question: 'What assumptions are you making?', help: 'What are you assuming about others\' intentions, outcomes, etc.?' },
        { id: 'q5', type: 'textarea', question: 'What is the evidence FOR your interpretation?', help: 'Facts only, not feelings' },
        { id: 'q6', type: 'textarea', question: 'What is the evidence AGAINST your interpretation?', help: 'Alternative explanations?' },
        { id: 'q7', type: 'textarea', question: 'Does your emotion fit the facts?', help: 'Based on evidence, is your emotional response justified?' }
      ]},
      { id: 'cope-ahead', name: 'Cope Ahead', module: 'Emotion Regulation', icon: '🎯', color: 'bg-gradient-to-r from-pink-500 to-rose-500', description: 'Prepare for difficult situations in advance', estimatedTime: '20 min', questions: [
        { id: 'q1', type: 'textarea', question: 'What situation are you preparing for?', help: 'Be specific about the challenging situation' },
        { id: 'q2', type: 'textarea', question: 'What emotions might come up?', help: 'Predict the emotions you might feel' },
        { id: 'q3', type: 'rating', question: 'How likely is this situation? (0-10)', help: '0 = very unlikely, 10 = very likely' },
        { id: 'q4', type: 'textarea', question: 'What specific skills will you use?', help: 'Name exact DBT skills you\'ll practice' },
        { id: 'q5', type: 'textarea', question: 'Imagine yourself using these skills', help: 'Visualize step-by-step coping effectively' },
        { id: 'q6', type: 'textarea', question: 'What obstacles might arise?', help: 'What could interfere with using skills?' },
        { id: 'q7', type: 'textarea', question: 'How will you overcome obstacles?', help: 'Plan B for each obstacle' }
      ]},
      { id: 'pros-cons', name: 'Pros & Cons', module: 'Distress Tolerance', icon: '⚖️', color: 'bg-gradient-to-r from-cyan-500 to-blue-500', description: 'Weigh pros and cons of tolerating distress', estimatedTime: '15 min', questions: [
        { id: 'q1', type: 'textarea', question: 'What crisis behavior are you considering?', help: 'What urge are you having?' },
        { id: 'q2', type: 'textarea', question: 'PROS of acting on crisis urge', help: 'Short-term benefits? What feels good about it?' },
        { id: 'q3', type: 'textarea', question: 'CONS of acting on crisis urge', help: 'Short and long-term negative consequences?' },
        { id: 'q4', type: 'textarea', question: 'PROS of resisting crisis urge', help: 'Benefits of NOT acting on urge? Long-term gains?' },
        { id: 'q5', type: 'textarea', question: 'CONS of resisting crisis urge', help: 'What\'s hard about not acting on the urge?' },
        { id: 'q6', type: 'textarea', question: 'Based on this analysis, what will you do?', help: 'What\'s the wise mind choice?' }
      ]}
    ];

    // ==================== BADGE DEFINITIONS ====================
    const BADGE_DEFINITIONS = [
      // Skill Logging Badges
      { id: 'first-skill', name: 'First Step', icon: '🌱', category: 'Skills', description: 'Logged your first skill', requirement: 'Log 1 skill', checkCondition: (data) => (data.skillEntries?.length || 0) >= 1 },
      { id: 'skills-10', name: 'Building Momentum', icon: '🚀', category: 'Skills', description: 'Logged 10 skills', requirement: 'Log 10 skills', checkCondition: (data) => (data.skillEntries?.length || 0) >= 10 },
      { id: 'skills-25', name: 'Committed Practitioner', icon: '⭐', category: 'Skills', description: 'Logged 25 skills', requirement: 'Log 25 skills', checkCondition: (data) => (data.skillEntries?.length || 0) >= 25 },
      { id: 'skills-50', name: 'Skill Master', icon: '🏆', category: 'Skills', description: 'Logged 50 skills', requirement: 'Log 50 skills', checkCondition: (data) => (data.skillEntries?.length || 0) >= 50 },
      { id: 'skills-100', name: 'DBT Warrior', icon: '👑', category: 'Skills', description: 'Logged 100 skills!', requirement: 'Log 100 skills', checkCondition: (data) => (data.skillEntries?.length || 0) >= 100 },
      
      // Worksheet Badges
      { id: 'first-worksheet', name: 'Worksheet Beginner', icon: '📝', category: 'Worksheets', description: 'Completed first worksheet', requirement: 'Complete 1 worksheet', checkCondition: (data) => Object.values(data.worksheetSessions || {}).filter(s => s.status === 'completed').length >= 1 },
      { id: 'worksheets-5', name: 'Deep Diver', icon: '🤿', category: 'Worksheets', description: 'Completed 5 worksheets', requirement: 'Complete 5 worksheets', checkCondition: (data) => Object.values(data.worksheetSessions || {}).filter(s => s.status === 'completed').length >= 5 },
      { id: 'worksheets-10', name: 'Worksheet Pro', icon: '🎓', category: 'Worksheets', description: 'Completed 10 worksheets', requirement: 'Complete 10 worksheets', checkCondition: (data) => Object.values(data.worksheetSessions || {}).filter(s => s.status === 'completed').length >= 10 },
      
      // Skill-Specific Badges
      { id: 'emotion-awareness', name: 'Emotion Detective', icon: '🔍', category: 'Progress', description: 'Tracked emotions 10 times', requirement: 'Log emotions before/after 10 times', checkCondition: (data) => (data.skillEntries?.filter(e => e.emotionBefore && e.emotionAfter).length || 0) >= 10 },
      { id: 'emotion-shifter', name: 'Emotion Shifter', icon: '🌈', category: 'Progress', description: 'Reduced emotion intensity by 3+ points, 5 times', requirement: 'Reduce emotions by 3+ points 5 times', checkCondition: (data) => (data.skillEntries?.filter(e => e.emotionBefore && e.emotionAfter && (e.emotionBefore - e.emotionAfter) >= 3).length || 0) >= 5 },
      { id: 'crisis-survivor', name: 'Crisis Survivor', icon: '🛡️', category: 'Distress Tolerance', description: 'Used TIPP or STOP 5 times', requirement: 'Use crisis skills 5 times', checkCondition: (data) => (data.skillEntries?.filter(e => (e.skill || '').toLowerCase().includes('tipp') || (e.skill || '').toLowerCase().includes('stop')).length || 0) >= 5 },
      { id: 'radical-acceptor', name: 'Radical Acceptor', icon: '🙏', category: 'Distress Tolerance', description: 'Practiced Radical Acceptance 3 times', requirement: 'Use Radical Acceptance 3 times', checkCondition: (data) => (data.skillEntries?.filter(e => (e.skill || '').toLowerCase().includes('radical acceptance')).length || 0) >= 3 },
      { id: 'wise-mind-seeker', name: 'Wise Mind Seeker', icon: '🧘', category: 'Mindfulness', description: 'Used Wise Mind 3 times', requirement: 'Practice Wise Mind 3 times', checkCondition: (data) => (data.skillEntries?.filter(e => (e.skill || '').toLowerCase().includes('wise mind')).length || 0) >= 3 },
      { id: 'dear-man-user', name: 'Effective Communicator', icon: '💬', category: 'Interpersonal', description: 'Used DEAR MAN 3 times', requirement: 'Practice DEAR MAN 3 times', checkCondition: (data) => (data.skillEntries?.filter(e => (e.skill || '').toLowerCase().includes('dear man')).length || 0) >= 3 },
      
      // Consistency Badges
      { id: 'monthly-logger', name: 'Consistent Tracker', icon: '📅', category: 'Consistency', description: 'Logged skills on 30 different days', requirement: 'Log on 30 different days', checkCondition: (data) => new Set(data.skillEntries?.map(e => e.date) || []).size >= 30 },
      { id: 'helpful-skills', name: 'Skill Finder', icon: '✨', category: 'Progress', description: 'Found 10 helpful skills (4+ rating)', requirement: 'Rate 10 skills as 4+ helpful', checkCondition: (data) => (data.skillEntries?.filter(e => e.helpfulness >= 4).length || 0) >= 10 },
      
      // Special Badges
      { id: 'safety-planner', name: 'Safety First', icon: '🛡️', category: 'Safety', description: 'Created a safety plan', requirement: 'Fill out safety plan', checkCondition: (data) => !!data.safetyPlan && Object.values(data.safetyPlan).some(v => v && v.length > 0) },
      { id: 'vulnerability-tracker', name: 'PLEASE Practitioner', icon: '💪', category: 'Self-Care', description: 'Tracked vulnerability factors 7 times', requirement: 'Track PLEASE 7 times', checkCondition: (data) => (data.vulnerabilityEntries?.length || 0) >= 7 },
      { id: 'note-taker', name: 'Reflective Writer', icon: '✍️', category: 'Skills', description: 'Added notes to 10 skill logs', requirement: 'Add notes to 10 entries', checkCondition: (data) => (data.skillEntries?.filter(e => e.notes && e.notes.trim().length > 0).length || 0) >= 10 }
    ];

    // ==================== DATA STORE ====================
    const DataStore = {
      // User management
      getUser: (userId) => {
        const users = JSON.parse(localStorage.getItem('dbt_users') || '[]');
        return users.find(u => u.id === userId);
      },
      saveUser: (user) => {
        const users = JSON.parse(localStorage.getItem('dbt_users') || '[]');
        const index = users.findIndex(u => u.id === user.id);
        if (index >= 0) users[index] = user;
        else users.push(user);
        localStorage.setItem('dbt_users', JSON.stringify(users));
      },
      deleteUser: (userId) => {
        const users = JSON.parse(localStorage.getItem('dbt_users') || '[]');
        localStorage.setItem('dbt_users', JSON.stringify(users.filter(u => u.id !== userId)));
        localStorage.removeItem(`dbt_skills_${userId}`);
        localStorage.removeItem(`dbt_worksheets_${userId}`);
        localStorage.removeItem(`dbt_safety_plan_${userId}`);
        localStorage.removeItem(`dbt_vulnerability_${userId}`);
        localStorage.removeItem(`dbt_badges_${userId}`);
      },
      
      // Skill entries
      getSkillEntries: (userId) => JSON.parse(localStorage.getItem(`dbt_skills_${userId}`) || '[]'),
      addSkillEntry: (entry) => {
        const entries = DataStore.getSkillEntries(entry.userId);
        entries.push(entry);
        localStorage.setItem(`dbt_skills_${entry.userId}`, JSON.stringify(entries));
      },
      deleteSkillEntry: (userId, entryId) => {
        const entries = DataStore.getSkillEntries(userId).filter(e => e.id !== entryId);
        localStorage.setItem(`dbt_skills_${userId}`, JSON.stringify(entries));
      },
      
      // Worksheets
      getWorksheetSessions: (userId) => JSON.parse(localStorage.getItem(`dbt_worksheets_${userId}`) || '{}'),
      getWorksheetSession: (userId, worksheetId) => {
        const sessions = DataStore.getWorksheetSessions(userId);
        return sessions[worksheetId];
      },
      saveWorksheetSession: (session) => {
        const sessions = DataStore.getWorksheetSessions(session.userId);
        sessions[session.worksheetId] = session;
        localStorage.setItem(`dbt_worksheets_${session.userId}`, JSON.stringify(sessions));
      },
      
      // Safety Plan
      getSafetyPlan: (userId) => JSON.parse(localStorage.getItem(`dbt_safety_plan_${userId}`) || 'null'),
      saveSafetyPlan: (plan) => localStorage.setItem(`dbt_safety_plan_${plan.userId}`, JSON.stringify(plan)),
      
      // Vulnerability tracking
      getVulnerabilityEntries: (userId) => JSON.parse(localStorage.getItem(`dbt_vulnerability_${userId}`) || '[]'),
      addVulnerabilityEntry: (entry) => {
        const entries = DataStore.getVulnerabilityEntries(entry.userId);
        entries.push(entry);
        localStorage.setItem(`dbt_vulnerability_${entry.userId}`, JSON.stringify(entries));
      },
      
      // Badges
      getUserBadges: (userId) => JSON.parse(localStorage.getItem(`dbt_badges_${userId}`) || '[]'),
      addUserBadge: (badge) => {
        const badges = DataStore.getUserBadges(badge.userId);
        badges.push(badge);
        localStorage.setItem(`dbt_badges_${badge.userId}`, JSON.stringify(badges));
      }
    };

    window.DataStore = DataStore;
    window.DBT_MODULES = DBT_MODULES;
    window.SKILL_DEFINITIONS = SKILL_DEFINITIONS;
    window.WORKSHEET_DEFINITIONS = WORKSHEET_DEFINITIONS;
    window.BADGE_DEFINITIONS = BADGE_DEFINITIONS;
    // ==================== BADGE SYSTEM ====================
    const BadgeSystem = {
      checkForNewBadges: (userId) => {
        if (!userId) return [];
        const user = DataStore.getUser(userId);
        if (!user) return [];
        const currentBadges = DataStore.getUserBadges(userId) || [];
        const earnedBadgeIds = currentBadges.map(b => b.badgeId);
        const data = {
          user,
          skillEntries: DataStore.getSkillEntries(userId),
          worksheetSessions: DataStore.getWorksheetSessions(userId),
          safetyPlan: DataStore.getSafetyPlan(userId),
          vulnerabilityEntries: DataStore.getVulnerabilityEntries(userId)
        };
        const newBadges = [];
        BADGE_DEFINITIONS.forEach(badge => {
          if (earnedBadgeIds.includes(badge.id)) return;
          try {
            if (badge.checkCondition(data)) {
              const earnedBadge = { badgeId: badge.id, userId, earnedAt: Date.now() };
              DataStore.addUserBadge(earnedBadge);
              newBadges.push({ ...badge, earnedAt: earnedBadge.earnedAt });
            }
          } catch (error) {
            console.error(`Error checking badge ${badge.id}:`, error);
          }
        });
        return newBadges;
      },

      getAllBadgesForUser: (userId) => {
        if (!userId) return [];
        const earnedBadges = DataStore.getUserBadges(userId) || [];
        const earnedBadgeIds = earnedBadges.map(b => b.badgeId);
        return BADGE_DEFINITIONS.map(badge => {
          const earned = earnedBadges.find(eb => eb.badgeId === badge.id);
          return { ...badge, earned: !!earned, earnedAt: earned ? earned.earnedAt : null };
        });
      },

      getEarnedBadges: (userId) => {
        if (!userId) return [];
        const earnedBadges = DataStore.getUserBadges(userId) || [];
        const earnedBadgeIds = earnedBadges.map(b => b.badgeId);
        return BADGE_DEFINITIONS.filter(badge => earnedBadgeIds.includes(badge.id))
          .map(badge => {
            const earned = earnedBadges.find(eb => eb.badgeId === badge.id);
            return { ...badge, earnedAt: earned.earnedAt };
          })
          .sort((a, b) => b.earnedAt - a.earnedAt);
      }
    };

    window.BadgeSystem = BadgeSystem;

    // ==================== BADGE NOTIFICATION ====================
    const BadgeNotification = ({ badge, onClose }) => {
      const [isVisible, setIsVisible] = useState(false);
      
      useEffect(() => {
        setTimeout(() => setIsVisible(true), 10);
        const timer = setTimeout(() => {
          setIsVisible(false);
          setTimeout(onClose, 300);
        }, 5000);
        return () => clearTimeout(timer);
      }, []);

      if (!badge) return null;

      return (
        <div className={`fixed top-6 right-6 z-50 transform transition-all duration-300 ${isVisible ? 'translate-x-0 opacity-100' : 'translate-x-full opacity-0'}`} style={{maxWidth:'400px'}}>
          <div className="bg-gradient-to-br from-yellow-400 via-orange-400 to-pink-500 rounded-2xl shadow-2xl p-6 text-white">
            <button onClick={() => { setIsVisible(false); setTimeout(onClose, 300); }} className="absolute top-2 right-2 text-white/80 hover:text-white text-2xl w-8 h-8 flex items-center justify-center">×</button>
            <div className="text-center">
              <div className="mb-3">
                <div className="text-6xl mb-2 animate-bounce">{badge.icon}</div>
                <div className="text-sm font-semibold uppercase tracking-wide opacity-90">Badge Unlocked!</div>
              </div>
              <h3 className="text-2xl font-bold mb-2">{badge.name}</h3>
              <p className="text-white/90 mb-4">{badge.description}</p>
              <div className="bg-white/20 backdrop-blur rounded-lg p-3 mb-4">
                <div className="text-xs font-semibold uppercase tracking-wide mb-1 opacity-90">Achievement</div>
                <div className="text-sm">{badge.requirement}</div>
              </div>
              <button onClick={() => { setIsVisible(false); setTimeout(onClose, 300); }} className="bg-white text-orange-600 px-6 py-2 rounded-lg font-semibold hover:bg-gray-100 transition-colors">
                Awesome!
              </button>
            </div>
          </div>
        </div>
      );
    };

    const BadgeNotificationManager = () => {
      const [notifications, setNotifications] = useState([]);
      
      useEffect(() => {
        const handler = e => {
          if (e.detail?.badge) {
            setNotifications(p => [...p, e.detail.badge]);
          }
        };
        window.addEventListener('badge-unlocked', handler);
        return () => window.removeEventListener('badge-unlocked', handler);
      }, []);

      if (!notifications.length) return null;
      
      const currentBadge = notifications[0];
      return <BadgeNotification badge={currentBadge} onClose={() => setNotifications(p => p.slice(1))} />;
    };

    const checkAndNotifyBadges = (userId) => {
      if (!userId) return;
      const newBadges = BadgeSystem.checkForNewBadges(userId);
      newBadges.forEach((badge, i) => {
        setTimeout(() => {
          window.dispatchEvent(new CustomEvent('badge-unlocked', { detail: { badge } }));
        }, i * 6000);
      });
    };

    window.checkAndNotifyBadges = checkAndNotifyBadges;

    // ==================== AUTH CONTEXT ====================
    const AuthContext = createContext();
    const useAuth = () => useContext(AuthContext);

    const AuthProvider = ({ children }) => {
      const [currentUser, setCurrentUser] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [currentView, setCurrentView] = useState('home');
      const [navigationData, setNavigationData] = useState(null);

      useEffect(() => {
        const savedUserId = localStorage.getItem('dbt_current_user');
        if (savedUserId) {
          const user = DataStore.getUser(savedUserId);
          if (user) {
            // Update streak
            const today = new Date().toDateString();
            const lastLogin = user.lastLoginDate;
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            
            if (lastLogin === today) {
              // Same day, no change
            } else if (lastLogin === yesterday) {
              // Consecutive day
              user.streak = (user.streak || 0) + 1;
              user.lastLoginDate = today;
              DataStore.saveUser(user);
            } else {
              // Streak broken
              user.streak = 1;
              user.lastLoginDate = today;
              DataStore.saveUser(user);
            }
            
            setCurrentUser(user);
          }
        }
        setIsLoading(false);
      }, []);

      const login = (user) => {
        const today = new Date().toDateString();
        user.lastLoginDate = today;
        user.streak = user.streak || 1;
        DataStore.saveUser(user);
        setCurrentUser(user);
        localStorage.setItem('dbt_current_user', user.id);
      };

      const logout = () => {
        setCurrentUser(null);
        localStorage.removeItem('dbt_current_user');
        setCurrentView('home');
      };

      const navigate = (view, data = null) => {
        setCurrentView(view);
        setNavigationData(data);
      };

      return (
        <AuthContext.Provider value={{ currentUser, login, logout, isLoading, navigate, currentView, navigationData }}>
          {children}
        </AuthContext.Provider>
      );
    };

    // ==================== AUTH SCREEN ====================
    const EnhancedAuthScreen = () => {
      const { login } = useAuth();
      const [mode, setMode] = useState('login');
      const [username, setUsername] = useState('');
      const [error, setError] = useState('');
      const [agreedToPrivacy, setAgreedToPrivacy] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');

        if (!username.trim()) {
          setError('Please enter a username');
          return;
        }

        if (mode === 'signup' && !agreedToPrivacy) {
          setError('Please agree to the privacy notice');
          return;
        }

        const users = JSON.parse(localStorage.getItem('dbt_users') || '[]');

        if (mode === 'login') {
          const user = users.find(u => u.username === username);
          if (!user) {
            setError('Username not found');
            return;
          }
          login(user);
        } else {
          const existing = users.find(u => u.username === username);
          if (existing) {
            setError('Username already exists');
            return;
          }
          const newUser = {
            id: Date.now().toString(),
            username,
            createdAt: Date.now(),
            streak: 1,
            lastLoginDate: new Date().toDateString()
          };
          DataStore.saveUser(newUser);
          login(newUser);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 flex items-center justify-center p-6">

            <div className="text-center mb-8">
              <div className="text-6xl mb-4">🧠</div>
              <h1 className="text-4xl font-bold text-gray-900 mb-2">WiseMind</h1>
              <p className="text-gray-600">Your DBT Skills Companion</p>
            </div>

            <div className="flex gap-2 mb-6">
              <button onClick={() => { setMode('login'); setError(''); }} className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${mode === 'login' ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700'}`}>
                Log In
              </button>
              <button onClick={() => { setMode('signup'); setError(''); }} className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${mode === 'signup' ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700'}`}>
                Sign Up
              </button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none" placeholder="Enter your username" />
              </div>

              {mode === 'signup' && (
                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded">
                  <label className="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" checked={agreedToPrivacy} onChange={(e) => setAgreedToPrivacy(e.target.checked)} className="mt-1 w-5 h-5 text-purple-600" />
                    <span className="text-sm text-gray-700">
                      I understand that all my data is stored locally on my device only. No data is sent to any server.
                    </span>
                  </label>
                </div>
              )}

              {error && (
                <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded">
                  <p className="text-red-700 text-sm">{error}</p>
                </div>
              )}

              <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-lg transition-colors">
                {mode === 'login' ? 'Log In' : 'Create Account'}
              </button>
            </form>

            <div className="mt-6 text-center text-sm text-gray-600">
              <p>🔒 100% Private • 💾 Local Storage Only</p>
            </div>
          </div>
        </div>
      );
    };

    // ==================== SKILL LOG COMPONENT ====================
    const SkillLog = ({ onNavigate, navigationData }) => {
      const { currentUser } = useAuth();
      const [showForm, setShowForm] = useState(false);
      const [entries, setEntries] = useState([]);
      const [formData, setFormData] = useState({
        module: '',
        skill: navigationData?.prefilledSkill || '',
        emotionBefore: 5,
        emotionAfter: 5,
        helpfulness: 3,
        notes: '',
        situation: ''
      });

      useEffect(() => {
        if (currentUser) {
          setEntries(DataStore.getSkillEntries(currentUser.id));
        }
      }, [currentUser]);

      useEffect(() => {
        if (navigationData?.prefilledSkill) {
          setFormData(prev => ({ ...prev, skill: navigationData.prefilledSkill }));
          setShowForm(true);
        }
      }, [navigationData]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!formData.module || !formData.skill) {
          alert('Please select a module and skill');
          return;
        }
        const entry = {
          ...formData,
          id: Date.now().toString(),
          userId: currentUser.id,
          date: new Date().toISOString().split('T')[0],
          timestamp: Date.now()
        };
        DataStore.addSkillEntry(entry);
        setEntries(DataStore.getSkillEntries(currentUser.id));
        setFormData({ module: '', skill: '', emotionBefore: 5, emotionAfter: 5, helpfulness: 3, notes: '', situation: '' });
        setShowForm(false);
        checkAndNotifyBadges(currentUser.id);
        alert('✓ Skill logged successfully!');
      };

      const handleDelete = (entryId) => {
        if (confirm('Delete this entry?')) {
          DataStore.deleteSkillEntry(currentUser.id, entryId);
          setEntries(DataStore.getSkillEntries(currentUser.id));
        }
      };

                </div>

                          <div className="text-2xl font-bold text-gray-900">{entry.helpfulness}/5</div>
                        </div>
                      </div>
                      {entry.notes && (
                        <div className="pt-4 border-t border-gray-200">
                          <p className="text-gray-700">{entry.notes}</p>
                        </div>

                    </div>
                  ))
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ==================== WORKSHEETS COMPONENT ====================
    const Worksheets = ({ onNavigate }) => {

      const [sessions, setSessions] = useState({});

      useEffect(() => {
        if (currentUser) {
          const allSessions = DataStore.getWorksheetSessions(currentUser.id);
          setSessions(allSessions);
        }
      }, [currentUser]);

      const handleWorksheetSelect = (worksheetId) => {
        setSelectedWorksheet(worksheetId);

        setSelectedWorksheet(null);
        const allSessions = DataStore.getWorksheetSessions(currentUser.id);
        setSessions(allSessions);
      };

      if (selectedWorksheet) {
        return <WorksheetSession worksheetId={selectedWorksheet} onBack={handleBack} />;
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 p-6">
          <div className="max-w-6xl mx-auto">
            <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
              ← Back to Home
            </button>

            <div className="bg-white rounded-2xl shadow-xl p-8 mb-8">
              <h1 className="text-4xl font-bold text-gray-900 mb-3">📝 DBT Worksheets</h1>
              <p className="text-gray-600 text-lg">Structured exercises to practice DBT skills</p>
            </div>

            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              {WORKSHEET_DEFINITIONS.map(worksheet => {
                const session = sessions[worksheet.id];
                const isCompleted = session?.status === 'completed';
                const isInProgress = session?.status === 'in_progress';

                return (
                  <div key={worksheet.id} className={`bg-white rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300 overflow-hidden border-2 ${isCompleted ? 'border-green-400' : isInProgress ? 'border-yellow-400' : 'border-transparent'}`}>
                    <div className={`h-2 ${worksheet.color}`}></div>
                    <div className="p-6">
                      <div className="flex items-start justify-between mb-4">
                        <div className="text-4xl">{worksheet.icon}</div>

                        {isInProgress && <div className="text-2xl">⏳</div>}
                      </div>
                      <h3 className="text-xl font-bold text-gray-900 mb-2">{worksheet.name}</h3>
                      <p className="text-sm text-gray-600 mb-1">{worksheet.module}</p>
                      <p className="text-gray-700 mb-4">{worksheet.description}</p>
                      <div className="flex items-center gap-2 text-sm text-gray-600 mb-4">
                        <span>⏱️ {worksheet.estimatedTime}</span>
                      </div>
                      <button onClick={() => handleWorksheetSelect(worksheet.id)} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">

                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    // ==================== WORKSHEET SESSION ====================
    const WorksheetSession = ({ worksheetId, onBack }) => {
      const { currentUser } = useAuth();
      const worksheet = WORKSHEET_DEFINITIONS.find(w => w.id === worksheetId);
      const [currentStep, setCurrentStep] = useState(0);
      const [responses, setResponses] = useState({});
      const [session, setSession] = useState(null);

      useEffect(() => {
        if (currentUser) {
          const existingSession = DataStore.getWorksheetSession(currentUser.id, worksheetId);
          if (existingSession) {
            setSession(existingSession);
            setResponses(existingSession.responses || {});
            setCurrentStep(existingSession.currentStep || 0);
          } else {
            const newSession = {
              worksheetId,
              userId: currentUser.id,
              status: 'in_progress',
              startedAt: Date.now(),
              currentStep: 0,
              responses: {}
            };
            DataStore.saveWorksheetSession(newSession);
            setSession(newSession);
          }
        }
      }, [currentUser, worksheetId]);

      const handleResponseChange = (questionId, value) => {
        setResponses(prev => ({ ...prev, [questionId]: value }));
      };

      const handleNext = () => {
        if (currentStep < worksheet.questions.length - 1) {
          const updatedSession = { ...session, currentStep: currentStep + 1, responses, updatedAt: Date.now() };
          DataStore.saveWorksheetSession(updatedSession);
          setCurrentStep(currentStep + 1);
        }
      };

      const handlePrevious = () => {
        if (currentStep > 0) {
          setCurrentStep(currentStep - 1);
        }
      };

      const handleComplete = () => {
        const completedSession = { ...session, status: 'completed', responses, completedAt: Date.now(), updatedAt: Date.now() };
        DataStore.saveWorksheetSession(completedSession);
        checkAndNotifyBadges(currentUser.id);
        alert('🎉 Worksheet completed! Great work!');
        onBack();
      };

      if (!worksheet || !session) return <div className="p-8 text-center">Loading...</div>;

      const currentQuestion = worksheet.questions[currentStep];
      const progress = ((currentStep + 1) / worksheet.questions.length) * 100;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 p-6">
          <div className="max-w-3xl mx-auto">
            <button onClick={onBack} className="mb-6 flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
              ← Back to Worksheets
            </button>

            <div className="bg-white rounded-2xl shadow-xl p-8">
              <div className="mb-6">
                <div className="flex items-center justify-between mb-2">
                  <h2 className="text-2xl font-bold text-gray-900">{worksheet.icon} {worksheet.name}</h2>
                  <span className="text-sm text-gray-600">Step {currentStep + 1} of {worksheet.questions.length}</span>
                </div>
                <div className="w-full bg-gray-200 rounded-full h-2">
                  <div className="bg-indigo-600 h-2 rounded-full transition-all duration-300" style={{width: `${progress}%`}}></div>
                </div>
              </div>

              <div className="mb-8">
                <h3 className="text-xl font-semibold text-gray-900 mb-4">{currentQuestion.question}</h3>
                {currentQuestion.help && (
                  <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4">
                    <p className="text-sm text-blue-800">{currentQuestion.help}</p>
                  </div>
                )}

                {currentQuestion.type === 'textarea' && (
                  <textarea value={responses[currentQuestion.id] || ''} onChange={(e) => handleResponseChange(currentQuestion.id, e.target.value)} className="w-full h-40 p-4 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none" placeholder="Type your response here..."></textarea>
                )}

                {currentQuestion.type === 'rating' && (
                  <div className="space-y-4">
                    <input type="range" min="0" max="10" value={responses[currentQuestion.id] || 5} onChange={(e) => handleResponseChange(currentQuestion.id, e.target.value)} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                    <div className="flex justify-between text-sm text-gray-600">
                      <span>0 - Not at all</span>
                      <span className="text-2xl font-bold text-indigo-600">{responses[currentQuestion.id] || 5}</span>
                      <span>10 - Extremely</span>
                    </div>
                  </div>
                )}

                {currentQuestion.type === 'multiselect' && (
                  <div className="space-y-2">
                    {currentQuestion.options.map(option => {
                      const selectedOptions = responses[currentQuestion.id] || [];
                      const isSelected = selectedOptions.includes(option);
                      return (
                        <label key={option} className="flex items-center gap-3 p-3 border-2 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors" style={{borderColor: isSelected ? '#4f46e5' : '#e5e7eb', backgroundColor: isSelected ? '#eef2ff' : 'white'}}>
                          <input type="checkbox" checked={isSelected} onChange={(e) => {
                            const current = responses[currentQuestion.id] || [];
                            const updated = e.target.checked ? [...current, option] : current.filter(o => o !== option);
                            handleResponseChange(currentQuestion.id, updated);
                          }} className="w-5 h-5 text-indigo-600" />
                          <span className="text-gray-800">{option}</span>
                        </label>
                      );
                    })}
                  </div>
                )}

                {currentQuestion.type === 'checklist' && (
                  <div className="space-y-3">
                    {currentQuestion.items.map(item => {
                      const checkedItems = responses[currentQuestion.id] || {};
                      return (
                        <div key={item} className="flex items-start gap-3 p-3 border rounded-lg hover:bg-gray-50">
                          <input type="checkbox" checked={checkedItems[item] || false} onChange={(e) => {
                            const updated = { ...checkedItems, [item]: e.target.checked };
                            handleResponseChange(currentQuestion.id, updated);
                          }} className="w-5 h-5 text-indigo-600 mt-1" />
                          <span className="text-gray-800">{item}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              <div className="flex justify-between gap-4">
                <button onClick={handlePrevious} disabled={currentStep === 0} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                  Previous
                </button>
                {currentStep < worksheet.questions.length - 1 ? (
                  <button onClick={handleNext} className="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
                    Next
                  </button>
                ) : (
                  <button onClick={handleComplete} className="px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition-colors">
                    Complete Worksheet
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==================== DISTRESS MODE ====================
    const DistressMode = ({ onNavigate }) => {
      const [selectedSkill, setSelectedSkill] = useState(null);

      const crisisSkills = [
        { id: 'tipp', name: 'TIPP', icon: '🧊', color: 'from-blue-500 to-cyan-500', description: 'Temperature, Intense exercise, Paced breathing, Paired muscle relaxation', steps: ['1. Use cold water/ice on face', '2. Do intense exercise (jumping jacks, run)', '3. Practice paced breathing', '4. Tense and relax muscle groups'] },
        { id: 'stop', name: 'STOP', icon: '🛑', color: 'from-red-500 to-pink-500', description: 'Stop, Take a step back, Observe, Proceed mindfully', steps: ['1. STOP - freeze, don\'t react', '2. Take a step back - get space', '3. Observe - notice what\'s happening', '4. Proceed mindfully - choose wise action'] },
        { id: 'grounding', name: '5-4-3-2-1', icon: '🌍', color: 'from-green-500 to-emerald-500', description: 'Grounding technique using five senses', steps: ['1. Name 5 things you can see', '2. Name 4 things you can touch', '3. Name 3 things you can hear', '4. Name 2 things you can smell', '5. Name 1 thing you can taste'] },
        { id: 'breathing', name: 'Paced Breathing', icon: '🫁', color: 'from-purple-500 to-indigo-500', description: 'Slow your breathing to calm your body', steps: ['1. Breathe in slowly for 4 counts', '2. Hold for 4 counts', '3. Breathe out slowly for 6 counts', '4. Repeat for 3-5 minutes'] },
        { id: 'self-soothe', name: 'Self-Soothe', icon: '🕯️', color: 'from-amber-500 to-orange-500', description: 'Use your five senses to comfort yourself', steps: ['1. Vision - look at something beautiful', '2. Hearing - listen to calming music', '3. Smell - use a pleasant scent', '4. Taste - enjoy a favorite flavor', '5. Touch - feel something comforting'] },
        { id: 'acceptance', name: 'Radical Acceptance', icon: '🙏', color: 'from-teal-500 to-cyan-500', description: 'Accept reality as it is, without judgment', steps: ['1. Observe that you\'re fighting reality', '2. Remind yourself reality is what it is', '3. Accept with your whole self (mind & body)', '4. Practice acceptance over and over'] }
      ];

      const emergencyContacts = [
        { name: '988 Suicide & Crisis Lifeline', number: '988', description: 'Call or text 24/7' },
        { name: 'Crisis Text Line', number: 'Text HOME to 741741', description: 'Text support 24/7' },
        { name: 'Emergency Services', number: '911', description: 'For immediate danger' }
      ];

      if (selectedSkill) {
        const skill = crisisSkills.find(s => s.id === selectedSkill);
        return (
          <div className="min-h-screen bg-gradient-to-br from-red-100 via-orange-50 to-yellow-100 p-6">
            <div className="max-w-3xl mx-auto">
              <button onClick={() => setSelectedSkill(null)} className="mb-6 flex items-center gap-2 text-red-600 hover:text-red-800 font-medium transition-colors">
                ← Back to Crisis Skills
              </button>
              <div className="bg-white rounded-2xl shadow-2xl p-8">
                <div className={`text-6xl mb-4 text-center`}>{skill.icon}</div>
                <h2 className="text-3xl font-bold text-gray-900 mb-4 text-center">{skill.name}</h2>
                <p className="text-lg text-gray-700 mb-8 text-center">{skill.description}</p>
                <div className="space-y-4 mb-8">
                  {skill.steps.map((step, idx) => (
                    <div key={idx} className="bg-gradient-to-r from-blue-50 to-purple-50 p-4 rounded-lg border-l-4 border-blue-500">
                      <p className="text-gray-800 font-medium">{step}</p>
                    </div>
                  ))}
                </div>
                <button onClick={() => onNavigate('skill-log', { prefilledSkill: skill.name })} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-lg text-lg transition-colors">
                  ✓ I Used This Skill - Log It
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-red-100 via-orange-50 to-yellow-100 p-6">
          <div className="max-w-5xl mx-auto">
            <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-red-600 hover:text-red-800 font-medium transition-colors">
              ← Back to Home
            </button>

            <div className="bg-red-50 border-2 border-red-400 rounded-2xl p-6 mb-8">
              <h1 className="text-3xl font-bold text-red-900 mb-3">🚨 You're in Distress - That's Okay</h1>
              <p className="text-lg text-red-800 mb-4">You're feeling overwhelmed right now, and that's a valid experience. These skills can help you get through this moment safely.</p>
              <p className="text-red-700 font-semibold">If you're in immediate danger, please call 911 or go to your nearest emergency room.</p>
            </div>

            <div className="bg-white rounded-2xl shadow-xl p-8 mb-8">
              <h2 className="text-2xl font-bold text-gray-900 mb-4">📞 Emergency Contacts</h2>
              <div className="grid md:grid-cols-3 gap-4">
                {emergencyContacts.map((contact, idx) => (
                  <div key={idx} className="border-2 border-red-300 rounded-xl p-4 hover:bg-red-50 transition-colors">
                    <h3 className="font-bold text-gray-900 mb-2">{contact.name}</h3>
                    <p className="text-2xl font-bold text-red-600 mb-1">{contact.number}</p>
                    <p className="text-sm text-gray-600">{contact.description}</p>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-xl p-8 mb-8">
              <h2 className="text-2xl font-bold text-gray-900 mb-6">🛠️ Crisis Survival Skills</h2>
              <p className="text-gray-700 mb-6">Choose a skill to use right now:</p>
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                {crisisSkills.map(skill => (
                  <button key={skill.id} onClick={() => setSelectedSkill(skill.id)} className={`bg-gradient-to-br ${skill.color} text-white rounded-xl p-6 hover:scale-105 transition-transform shadow-lg`}>
                    <div className="text-4xl mb-3">{skill.icon}</div>
                    <h3 className="text-xl font-bold mb-2">{skill.name}</h3>
                    <p className="text-sm text-white/90">{skill.description}</p>
                  </button>
                ))}
              </div>
            </div>

            <div className="bg-blue-50 border-2 border-blue-300 rounded-2xl p-6">
              <h2 className="text-xl font-bold text-blue-900 mb-3">💙 Remember</h2>
              <ul className="space-y-2 text-blue-800">
                <li>• This feeling will pass</li>
                <li>• You've survived 100% of your worst days so far</li>
                <li>• Using these skills is a sign of strength, not weakness</li>
                <li>• It's okay to reach out for help</li>
              </ul>
            </div>
          </div>
        </div>
      );
    };
    // ==================== LEARN COMPONENT ====================
    const Learn = ({ onNavigate }) => {
      const [selectedSkill, setSelectedSkill] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [moduleFilter, setModuleFilter] = useState('all');

      const skillDetails = {
        'Mindfulness': [
          { id: 'wise-mind', name: 'Wise Mind', icon: '🧘', description: 'Balance between emotion mind and reasonable mind', whenToUse: 'When you need to make important decisions or find balance', howTo: ['Notice when you\'re in emotion mind (all feelings) or reasonable mind (all logic)', 'Take a few deep breaths', 'Ask yourself: "What does my wise mind say?"', 'Look for the middle path that honors both feelings and facts'], example: 'Before sending an angry text, pause and ask your wise mind what to do' },
          { id: 'observe', name: 'Observe', icon: '👁️', description: 'Notice without judging or reacting', whenToUse: 'When you need to step back from a situation', howTo: ['Notice what you\'re sensing (sights, sounds, smells, tastes, touch)', 'Watch your thoughts and feelings like clouds passing', 'Don\'t judge as good or bad, just notice', 'Let experiences come and go'], example: 'Notice "I\'m having the thought that I\'m worthless" rather than believing it as fact' },
          { id: 'describe', name: 'Describe', icon: '📝', description: 'Put words to your experience', whenToUse: 'When emotions feel overwhelming or confusing', howTo: ['Put labels on what you observe', 'Stick to the facts, not interpretations', 'Describe one thing at a time', 'Use neutral language'], example: 'Say "My heart is racing and my hands are shaking" instead of "I\'m having a panic attack and dying"' },
          { id: 'participate', name: 'Participate', icon: '🎯', description: 'Fully engage in the present moment', whenToUse: 'When you want to feel more connected and alive', howTo: ['Throw yourself completely into an activity', 'Become one with what you\'re doing', 'Forget self-consciousness', 'Go with the flow'], example: 'When dancing, become the dance; when eating, fully taste each bite' }
        ],
        'Distress Tolerance': [
          { id: 'tipp', name: 'TIPP', icon: '🧊', description: 'Temperature, Intense exercise, Paced breathing, Paired muscle relaxation', whenToUse: 'When emotions are at a 10/10 and you need immediate relief', howTo: ['T: Use cold water/ice on your face (triggers dive reflex)', 'I: Do intense exercise for 10-20 minutes', 'P: Practice paced breathing (slow, deep breaths)', 'P: Tense and release muscle groups'], example: 'Hold ice cubes when you feel the urge to self-harm' },
          { id: 'accepts', name: 'ACCEPTS', icon: '🎨', description: 'Activities, Contributing, Comparisons, Emotions, Pushing away, Thoughts, Sensations', whenToUse: 'When you need to distract from painful emotions temporarily', howTo: ['Activities: Do something engaging', 'Contributing: Help someone else', 'Comparisons: Compare to times you felt worse', 'Emotions: Create opposite emotions (funny videos)', 'Pushing away: Mentally push the situation away for now', 'Thoughts: Focus thoughts elsewhere (counting, puzzles)', 'Sensations: Create strong physical sensations'], example: 'Watch a funny movie when feeling depressed; do a puzzle when anxious' },
          { id: 'radical-acceptance', name: 'Radical Acceptance', icon: '🙏', description: 'Accepting reality as it is, without judgment', whenToUse: 'When you\'re fighting against reality and causing yourself suffering', howTo: ['Observe that you\'re questioning or fighting reality', 'Remind yourself that reality is what it is', 'Accept with your whole self (mind, body, spirit)', 'Practice accepting over and over again', 'Note what you feel after accepting'], example: 'Accept that someone you love has died, even though it\'s painful' }
        ],
        'Emotion Regulation': [
          { id: 'opposite-action', name: 'Opposite Action', icon: '🔄', description: 'Act opposite to your emotion urge', whenToUse: 'When your emotion doesn\'t fit the facts or isn\'t effective', howTo: ['Identify the emotion and its action urge', 'Check if the emotion fits the facts', 'If not, act opposite ALL THE WAY', 'Do the opposite with your body, face, and posture'], example: 'If you feel like hiding when anxious, approach the situation instead' },
          { id: 'please', name: 'PLEASE', icon: '💊', description: 'PhysicaL illness, Eating, Avoid drugs, Sleep, Exercise', whenToUse: 'Daily preventive maintenance for emotional health', howTo: ['Treat physical illness promptly', 'Eat balanced, regular meals', 'Avoid mood-altering substances', 'Get consistent, adequate sleep', 'Exercise regularly'], example: 'Eat three meals, sleep 7-9 hours, exercise 20 minutes daily' },
          { id: 'check-the-facts', name: 'Check the Facts', icon: '🔍', description: 'Question your interpretations and assumptions', whenToUse: 'When emotions seem extreme or don\'t match the situation', howTo: ['Describe the facts of the situation', 'Identify your interpretations/judgments', 'Ask: What\'s the evidence for and against?', 'Consider alternative explanations', 'Assess if the emotion fits the facts'], example: 'Friend doesn\'t text back → fact. They hate me → interpretation to check' }
        ],
        'Interpersonal Effectiveness': [
          { id: 'dear-man', name: 'DEAR MAN', icon: '💬', description: 'Effectively ask for what you need', whenToUse: 'When you need to make a request or set a boundary', howTo: ['Describe the situation', 'Express your feelings/opinions', 'Assert by asking clearly', 'Reinforce by explaining benefits', 'stay Mindful (broken record)', 'Appear confident', 'Negotiate if needed'], example: '"When you cancel plans last-minute (D), I feel hurt (E). Could you give me 24hr notice? (A) That way I can make other plans (R)."' },
          { id: 'give', name: 'GIVE', icon: '💝', description: 'Maintain relationships while being effective', whenToUse: 'When you want to keep a relationship strong while asking for something', howTo: ['be Gentle (no attacks, threats, judgments)', 'act Interested (listen, don\'t interrupt)', 'Validate their feelings/perspective', 'use an Easy manner (smile, be lighthearted)'], example: 'Listen to their side, validate their feelings, even while disagreeing' },
          { id: 'fast', name: 'FAST', icon: '🛡️', description: 'Keep your self-respect in interactions', whenToUse: 'When you need to maintain your values and self-respect', howTo: ['be Fair to yourself and others', 'no Apologies (for existing, having opinions)', 'Stick to your values', 'be Truthful (no lies or exaggerations)'], example: 'Don\'t apologize for asking for time off; you deserve breaks' }
        ]
      };

      const allSkills = Object.entries(skillDetails).flatMap(([module, skills]) => 
        skills.map(skill => ({ ...skill, module }))
      );

      const filteredSkills = allSkills.filter(skill => {
        const matchesSearch = skill.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                             skill.description.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesModule = moduleFilter === 'all' || skill.module === moduleFilter;
        return matchesSearch && matchesModule;

      if (selectedSkill) {

        return (
          <div className="min-h-screen bg-gradient-to-br from-green-50 via-white to-blue-50 p-6">
            <div className="max-w-4xl mx-auto">
              <button onClick={() => setSelectedSkill(null)} className="mb-6 flex items-center gap-2 text-green-600 hover:text-green-800 font-medium transition-colors">

              </button>
              <div className="bg-white rounded-2xl shadow-2xl p-8">

                  Log This Skill
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-green-50 via-white to-blue-50 p-6">
          <div className="max-w-6xl mx-auto">
            <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-green-600 hover:text-green-800 font-medium transition-colors">
              ← Back to Home
            </button>

    // ==================== SAFETY PLAN ====================
    const SafetyPlan = ({ onNavigate }) => {
      const { currentUser } = useAuth();
      const [plan, setPlan] = useState({
        warningSignsInternal: '',
        warningSignsExternal: '',
        copingStrategies: '',
        socialDistractions: '',
        peopleWhoCanHelp: '',
        professionalsToContact: '',
        environmentSafety: '',
        reasonsForLiving: ''
      });
      const [saveStatus, setSaveStatus] = useState('');

      useEffect(() => {
        if (currentUser) {
          const saved = DataStore.getSafetyPlan(currentUser.id);
          if (saved) setPlan(saved);
        }
      }, [currentUser]);

      const handleSave = () => {
        if (!currentUser) return;
        setSaveStatus('saving');
        DataStore.saveSafetyPlan({ ...plan, userId: currentUser.id, updatedAt: Date.now() });
        checkAndNotifyBadges(currentUser.id);
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus(''), 3000);
      };

      const handleExport = () => {
        const planText = `MY SAFETY PLAN\nCreated: ${new Date().toLocaleDateString()}\n\nSTEP 1: WARNING SIGNS\nInternal: ${plan.warningSignsInternal || '(Not filled)'}\nExternal: ${plan.warningSignsExternal || '(Not filled)'}\n\nSTEP 2: COPING STRATEGIES\n${plan.copingStrategies || '(Not filled)'}\n\nSTEP 3: SOCIAL DISTRACTIONS\n${plan.socialDistractions || '(Not filled)'}\n\nSTEP 4: PEOPLE WHO CAN HELP\n${plan.peopleWhoCanHelp || '(Not filled)'}\n\nSTEP 5: PROFESSIONALS\n${plan.professionalsToContact || '(Not filled)'}\n\nSTEP 6: ENVIRONMENT SAFETY\n${plan.environmentSafety || '(Not filled)'}\n\nSTEP 7: REASONS FOR LIVING\n${plan.reasonsForLiving || '(Not filled)'}\n\nEMERGENCY CONTACTS\n988 - Suicide & Crisis Lifeline\n741741 - Crisis Text Line\n911 - Emergency Services`;
        const blob = new Blob([planText], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `safety-plan-${new Date().toISOString().split('T')[0]}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const sections = [
        { key: 'warningSignsInternal', label: 'Step 1a: Internal Warning Signs', placeholder: 'Thoughts, images, mood, behaviors that show a crisis might be developing...' },
        { key: 'warningSignsExternal', label: 'Step 1b: External Warning Signs', placeholder: 'Situations, people, events, or circumstances that lead to crisis...' },
        { key: 'copingStrategies', label: 'Step 2: Coping Strategies', placeholder: 'Things I can do on my own to feel better (take a walk, listen to music, exercise)...' },
        { key: 'socialDistractions', label: 'Step 3: Social Distractions', placeholder: 'People and social settings that provide distraction (friends to call, places to go)...' },
        { key: 'peopleWhoCanHelp', label: 'Step 4: People Who Can Help', placeholder: 'People I can ask for help (friends, family, their phone numbers)...' },
        { key: 'professionalsToContact', label: 'Step 5: Professionals to Contact', placeholder: 'Mental health professionals, crisis services, their contact information...' },
        { key: 'environmentSafety', label: 'Step 6: Making Environment Safe', placeholder: 'How to reduce access to lethal means (remove pills, give away weapons, etc.)...' },
        { key: 'reasonsForLiving', label: 'Step 7: Reasons for Living', placeholder: 'What makes life worth living (people, pets, goals, values, hopes)...' }
      ];

      return (
        <div className="min-h-screen bg-gradient-to-br from-red-50 via-white to-orange-50 p-6">
          <div className="max-w-4xl mx-auto">
            <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-red-600 hover:text-red-800 font-medium transition-colors">
              ← Back to Home
            </button>

            <div className="bg-white rounded-2xl shadow-xl p-8 mb-8">
              <h1 className="text-4xl font-bold text-gray-900 mb-3">🛡️ Safety Plan</h1>
              <p className="text-gray-600 text-lg mb-6">A plan to keep yourself safe during a crisis</p>

              <div className="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
                <p className="text-red-800 font-semibold">⚠️ If you're in immediate danger, call 911 or go to your nearest emergency room.</p>
                <p className="text-red-700 mt-2">National Suicide Prevention Lifeline: <strong>988</strong> (call or text)</p>
              </div>

              <div className="space-y-6">
                {sections.map(section => (
                  <div key={section.key}>
                    <label className="block text-lg font-semibold text-gray-900 mb-2">{section.label}</label>
                    <textarea value={plan[section.key]} onChange={(e) => setPlan({...plan, [section.key]: e.target.value})} placeholder={section.placeholder} className="w-full h-32 p-4 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none"></textarea>
                  </div>
                ))}
              </div>

              <div className="flex gap-4 mt-8">
                <button onClick={handleSave} className="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                  {saveStatus === 'saving' ? 'Saving...' : saveStatus === 'saved' ? '✓ Saved!' : 'Save Safety Plan'}
                </button>
                <button onClick={handleExport} className="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg transition-colors">
                  Export
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==================== TRACK VULNERABILITY ====================

      const [showForm, setShowForm] = useState(true);

        const newEntry = { ...entry, userId: currentUser.id, date: new Date().toISOString().split('T')[0], timestamp: Date.now() };
        DataStore.addVulnerabilityEntry(newEntry);
        setEntries(DataStore.getVulnerabilityEntries(currentUser.id));
        setEntry({ sleep: 5, meals: 5, exercise: 5, meds: 5, substances: 5, physicalHealth: 5, stress: 7, notes: '' });

      const factors = [

        { key: 'meals', label: 'Eating Regularly', icon: '🍽️', lowLabel: 'Skipped', highLabel: 'All Meals' },
        { key: 'exercise', label: 'Physical Activity', icon: '🏃', lowLabel: 'None', highLabel: 'Active' },
        { key: 'meds', label: 'Medication Adherence', icon: '💊', lowLabel: 'Missed', highLabel: 'On Track' },
        { key: 'substances', label: 'Substance Use', icon: '🚫', lowLabel: 'High', highLabel: 'None' },
        { key: 'physicalHealth', label: 'Physical Health', icon: '🩺', lowLabel: 'Sick', highLabel: 'Healthy' },

              <h1 className="text-4xl font-bold text-gray-900 mb-3">📊 Track Vulnerability Factors</h1>

            <div className="flex gap-4 mb-6">

                Log Today
              </button>
              <button onClick={() => setShowForm(false)} className={`flex-1 py-3 px-6 rounded-lg font-semibold transition-colors ${!showForm ? 'bg-amber-600 text-white' : 'bg-gray-200 text-gray-700'}`}>
                View History ({entries.length})
              </button>
            </div>

            {showForm ? (
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-2xl font-bold text-gray-900 mb-6">How are you doing today?</h2>
                <div className="space-y-6">
                  {factors.map(factor => (
                    <div key={factor.key}>
                      <div className="flex items-center justify-between mb-2">
                        <label className="text-lg font-semibold text-gray-900">{factor.icon} {factor.label}</label>
                        <span className="text-2xl font-bold text-amber-600">{entry[factor.key]}</span>
                      </div>
                      <input type="range" min="0" max="10" value={entry[factor.key]} onChange={(e) => setEntry({...entry, [factor.key]: parseInt(e.target.value)})} className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-amber-600" />
                      <div className="flex justify-between text-sm text-gray-600 mt-1">
                        <span>{factor.lowLabel}</span>
                        <span>{factor.highLabel}</span>
                      </div>
                    </div>
                  ))}
                  <div>
                    <label className="block text-lg font-semibold text-gray-900 mb-2">Notes (optional)</label>
                    <textarea value={entry.notes} onChange={(e) => setEntry({...entry, notes: e.target.value})} placeholder="Any additional notes about your day..." className="w-full h-24 p-4 border-2 border-gray-300 rounded-lg focus:border-amber-500 focus:outline-none"></textarea>
                  </div>
                </div>
                <button onClick={handleSubmit} className="w-full mt-6 bg-amber-600 hover:bg-amber-700 text-white font-bold py-4 px-6 rounded-lg text-lg transition-colors">
                  Save Today's Entry
                </button>

              <div className="space-y-4">
                {entries.length === 0 ? (
                  <div className="bg-white rounded-xl p-8 text-center">

                  </div>
                ) : (
                  entries.slice().reverse().map((e, idx) => (
                    <div key={idx} className="bg-white rounded-xl shadow-lg p-6">
                      <div className="flex justify-between items-start mb-4">

              </div>

    // ==================== INSIGHTS & ANALYTICS ====================
    const Insights = ({ onNavigate }) => {
      const { currentUser } = useAuth();
      const [entries, setEntries] = useState([]);
      const [timeRange, setTimeRange] = useState('30');

      useEffect(() => {
        if (currentUser) {
          setEntries(DataStore.getSkillEntries(currentUser.id) || []);
        }
      }, [currentUser]);

      const daysAgo = parseInt(timeRange);
      const cutoffDate = Date.now() - (daysAgo * 24 * 60 * 60 * 1000);
      const filteredEntries = entries.filter(e => e.timestamp >= cutoffDate);

      const totalEntries = filteredEntries.length;
      const avgEmotionBefore = filteredEntries.filter(e => e.emotionBefore).reduce((sum, e) => sum + e.emotionBefore, 0) / filteredEntries.filter(e => e.emotionBefore).length || 0;
      const avgEmotionAfter = filteredEntries.filter(e => e.emotionAfter).reduce((sum, e) => sum + e.emotionAfter, 0) / filteredEntries.filter(e => e.emotionAfter).length || 0;
      const avgHelpfulness = filteredEntries.filter(e => e.helpfulness).reduce((sum, e) => sum + e.helpfulness, 0) / filteredEntries.filter(e => e.helpfulness).length || 0;

      const moduleCount = {};
      filteredEntries.forEach(e => {
        if (e.module) moduleCount[e.module] = (moduleCount[e.module] || 0) + 1;
      });

      const skillCount = {};
      filteredEntries.forEach(e => {
        if (e.skill) skillCount[e.skill] = (skillCount[e.skill] || 0) + 1;
      });

      const topSkills = Object.entries(skillCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const topModules = Object.entries(moduleCount).sort((a, b) => b[1] - a[1]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-pink-50 p-6">
          <div className="max-w-6xl mx-auto">
            <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-purple-600 hover:text-purple-800 font-medium transition-colors">
              ← Back to Home
            </button>

            <div className="bg-white rounded-2xl shadow-xl p-8 mb-8">
              <h1 className="text-4xl font-bold text-gray-900 mb-3">📊 Insights & Analytics</h1>
              <p className="text-gray-600 text-lg mb-6">Track your progress and patterns</p>
              <select value={timeRange} onChange={(e) => setTimeRange(e.target.value)} className="px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none">
                <option value="7">Last 7 days</option>
                <option value="30">Last 30 days</option>
                <option value="90">Last 90 days</option>
                <option value="365">Last year</option>
              </select>
            </div>

            {totalEntries === 0 ? (
              <div className="bg-white rounded-2xl shadow-xl p-12 text-center">
                <div className="text-6xl mb-4">📈</div>
                <h2 className="text-2xl font-bold text-gray-900 mb-3">No data yet</h2>
                <p className="text-gray-600 mb-6">Start logging skills to see your insights!</p>
                <button onClick={() => onNavigate('skill-log')} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                  Log Your First Skill
                </button>
              </div>
            ) : (
              <>
                <div className="grid md:grid-cols-4 gap-6 mb-8">
                  <div className="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl shadow-xl p-6 text-white">
                    <div className="text-3xl mb-2">📝</div>
                    <div className="text-4xl font-bold mb-1">{totalEntries}</div>
                    <div className="text-blue-100">Skills Logged</div>
                  </div>
                  <div className="bg-gradient-to-br from-green-500 to-green-600 rounded-2xl shadow-xl p-6 text-white">
                    <div className="text-3xl mb-2">📉</div>
                    <div className="text-4xl font-bold mb-1">{(avgEmotionBefore - avgEmotionAfter).toFixed(1)}</div>
                    <div className="text-green-100">Avg Emotion Reduction</div>
                  </div>
                  <div className="bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl shadow-xl p-6 text-white">
                    <div className="text-3xl mb-2">⭐</div>
                    <div className="text-4xl font-bold mb-1">{avgHelpfulness.toFixed(1)}/5</div>
                    <div className="text-purple-100">Avg Helpfulness</div>
                  </div>
                  <div className="bg-gradient-to-br from-orange-500 to-orange-600 rounded-2xl shadow-xl p-6 text-white">
                    <div className="text-3xl mb-2">🔥</div>
                    <div className="text-4xl font-bold mb-1">{Math.ceil(totalEntries / daysAgo)}</div>
                    <div className="text-orange-100">Skills per Day</div>
                  </div>
                </div>

                <div className="grid md:grid-cols-2 gap-8">
                  <div className="bg-white rounded-2xl shadow-xl p-8">
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Most Used Skills</h2>
                    <div className="space-y-4">
                      {topSkills.map(([skill, count], idx) => (
                        <div key={idx}>
                          <div className="flex justify-between mb-2">
                            <span className="font-semibold text-gray-900">{skill}</span>
                            <span className="text-purple-600 font-bold">{count}</span>
                          </div>
                          <div className="w-full bg-gray-200 rounded-full h-3">
                            <div className="bg-gradient-to-r from-purple-500 to-pink-500 h-3 rounded-full" style={{width: `${(count / topSkills[0][1]) * 100}%`}}></div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl shadow-xl p-8">
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Skills by Module</h2>
                    <div className="space-y-4">
                      {topModules.map(([module, count], idx) => (
                        <div key={idx}>
                          <div className="flex justify-between mb-2">
                            <span className="font-semibold text-gray-900">{module}</span>
                            <span className="text-blue-600 font-bold">{count}</span>
                          </div>
                          <div className="w-full bg-gray-200 rounded-full h-3">
                            <div className="bg-gradient-to-r from-blue-500 to-cyan-500 h-3 rounded-full" style={{width: `${(count / totalEntries) * 100}%`}}></div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    // ==================== WHY DBT PAGE ====================

        a.href = url;
        a.download = `wisemind-data-${currentUser.username}-${Date.now()}.json`;
        document.body.appendChild(a);

      return (
        <AuthProvider>
          <AppContent />
        </AuthProvider>
      );
    };

    const AppContent = () => {
      const { currentUser, isLoading, navigate, currentView, navigationData } = useAuth();

      if (isLoading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 flex items-center justify-center">
            <div className="text-center">
              <div className="text-6xl mb-4 animate-bounce">🧠</div>
              <h2 className="text-2xl font-bold text-gray-900">Loading WiseMind...</h2>
            </div>
          </div>
        );
      }

      if (!currentUser) {
        return <EnhancedAuthScreen />;
      }

      const views = {
        'home': <Home onNavigate={navigate} />,
        'skill-log': <SkillLog onNavigate={navigate} navigationData={navigationData} />,
        'worksheets': <Worksheets onNavigate={navigate} />,
        'insights': <Insights onNavigate={navigate} />,
        'distress': <DistressMode onNavigate={navigate} />,
        'learn': <Learn onNavigate={navigate} />,
        'safety-plan': <SafetyPlan onNavigate={navigate} />,
        'track-vulnerability': <TrackVulnerability onNavigate={navigate} />,
        'badges': <BadgesPage onNavigate={navigate} />,
        'why-dbt': <WhyDBT onNavigate={navigate} />,
        'settings': <Settings onNavigate={navigate} />,
        'privacy': <PrivacyNotice onNavigate={navigate} />,
        'about': <AboutPage onNavigate={navigate} />
      };

      return views[currentView] || views['home'];
    };

    // ==================== RENDER APP ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
