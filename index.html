<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiseMind - DBT Skills Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @media print {
            body * { visibility: hidden; }
            #printable-content, #printable-content * { visibility: visible; }
            #printable-content { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
            * { overflow: visible !important; max-height: none !important; }
        }
        .printing-active { overflow: visible !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // ==================== DATA & DEFINITIONS ====================
        
        const DBT_MODULES = ['Mindfulness', 'Distress Tolerance', 'Emotion Regulation', 'Interpersonal Effectiveness'];

        const SKILL_DEFINITIONS = {
          'Mindfulness': ['Wise Mind', 'Observe', 'Describe', 'Participate', 'Non-Judgmental Stance', 'One-Mindfully', 'Effectiveness'],
          'Distress Tolerance': ['STOP', 'TIPP', 'Paced Breathing', 'Grounding (5-4-3-2-1)', 'Self-Soothe with Senses', 'ACCEPTS', 'IMPROVE the Moment', 'Radical Acceptance', 'Pros and Cons', 'Willingness'],
          'Emotion Regulation': ['Identify & Label Emotions', 'Check the Facts', 'Opposite Action', 'Problem Solving', 'ABC PLEASE', 'Build Positive Experiences'],
          'Interpersonal Effectiveness': ['DEAR MAN', 'GIVE', 'FAST', 'Validation', 'Managing Conflict', 'Setting Boundaries']
        };

        const WORKSHEET_DEFINITIONS = [
          {
            id: 'ws-1',
            title: 'Wise Mind Practice',
            module: 'Mindfulness',
            description: 'Find the balance between Emotion Mind and Reasonable Mind',
            fields: [
              { id: 'situation', label: 'Describe the situation you need to make a decision about:', type: 'textarea' },
              { id: 'emotion_mind', label: 'What is Emotion Mind saying?', type: 'textarea' },
              { id: 'reasonable_mind', label: 'What is Reasonable Mind saying?', type: 'textarea' },
              { id: 'wise_mind', label: 'After breathing and centering, what does Wise Mind say?', type: 'textarea' },
              { id: 'action', label: 'What action will you take from Wise Mind?', type: 'textarea' }
            ]
          },
          {
            id: 'ws-2',
            title: 'Opposite Action Worksheet',
            module: 'Emotion Regulation',
            description: 'Change your emotion by acting opposite to the emotion urge',
            fields: [
              { id: 'emotion', label: 'What emotion are you experiencing?', type: 'text' },
              { id: 'intensity', label: 'Intensity (0-10):', type: 'text' },
              { id: 'situation', label: 'What is the situation?', type: 'textarea' },
              { id: 'facts', label: 'Check the Facts: Does the emotion fit the facts?', type: 'textarea' },
              { id: 'urge', label: 'What is the action urge?', type: 'textarea' },
              { id: 'opposite', label: 'What is the OPPOSITE action?', type: 'textarea' },
              { id: 'plan', label: 'How will you do opposite action ALL THE WAY?', type: 'textarea' },
              { id: 'result', label: 'After doing opposite action, how do you feel? (0-10)', type: 'text' }
            ]
          },
          {
            id: 'ws-3',
            title: 'Check the Facts',
            module: 'Emotion Regulation',
            description: 'Determine if your emotional reaction fits the facts',
            fields: [
              { id: 'emotion', label: 'What emotion are you feeling?', type: 'text' },
              { id: 'intensity', label: 'How intense? (0-10)', type: 'text' },
              { id: 'event', label: 'What is the prompting event? (Just the facts)', type: 'textarea' },
              { id: 'interpretation', label: 'What is your interpretation of the event?', type: 'textarea' },
              { id: 'assumptions', label: 'What assumptions or judgments are you making?', type: 'textarea' },
              { id: 'alternative', label: 'What are alternative explanations?', type: 'textarea' },
              { id: 'fits_facts', label: 'Does the emotion fit the facts?', type: 'textarea' }
            ]
          },
          {
            id: 'ws-4',
            title: 'DEAR MAN',
            module: 'Interpersonal Effectiveness',
            description: 'Ask for what you need effectively',
            fields: [
              { id: 'objective', label: 'What is your objective?', type: 'textarea' },
              { id: 'describe', label: 'DESCRIBE the situation (just the facts):', type: 'textarea' },
              { id: 'express', label: 'EXPRESS your feelings and opinions:', type: 'textarea' },
              { id: 'assert', label: 'ASSERT what you want clearly:', type: 'textarea' },
              { id: 'reinforce', label: 'REINFORCE (explain positive effects):', type: 'textarea' },
              { id: 'mindful', label: 'Stay MINDFUL: How will you stay focused?', type: 'textarea' },
              { id: 'appear', label: 'APPEAR confident: How?', type: 'textarea' },
              { id: 'negotiate', label: 'NEGOTIATE: What are you willing to compromise?', type: 'textarea' }
            ]
          },
          {
            id: 'ws-5',
            title: 'Pros and Cons',
            module: 'Distress Tolerance',
            description: 'Evaluate pros and cons of tolerating distress vs. acting on urges',
            fields: [
              { id: 'urge', label: 'What is the urge or crisis behavior?', type: 'textarea' },
              { id: 'pros_tolerate', label: 'PROS of resisting the urge:', type: 'textarea' },
              { id: 'cons_tolerate', label: 'CONS of resisting the urge:', type: 'textarea' },
              { id: 'pros_act', label: 'PROS of acting on the urge:', type: 'textarea' },
              { id: 'cons_act', label: 'CONS of acting on the urge:', type: 'textarea' },
              { id: 'decision', label: 'Based on this, what will you do?', type: 'textarea' }
            ]
          },
          {
            id: 'ws-6',
            title: 'Radical Acceptance',
            module: 'Distress Tolerance',
            description: 'Practice accepting reality as it is',
            fields: [
              { id: 'situation', label: 'What reality are you having difficulty accepting?', type: 'textarea' },
              { id: 'fighting', label: 'How are you fighting reality?', type: 'textarea' },
              { id: 'suffering', label: 'How is refusing to accept causing suffering?', type: 'textarea' },
              { id: 'caused', label: 'What caused this reality?', type: 'textarea' },
              { id: 'accept_statement', label: 'Write an acceptance statement:', type: 'textarea' },
              { id: 'feelings', label: 'What feelings come up when you practice acceptance?', type: 'textarea' }
            ]
          },
          {
            id: 'ws-7',
            title: 'ABC PLEASE Tracker',
            module: 'Emotion Regulation',
            description: 'Track your self-care to reduce emotional vulnerability',
            fields: [
              { id: 'date', label: 'Date:', type: 'text' },
              { id: 'accumulate', label: 'Accumulate Positive Experiences:', type: 'textarea' },
              { id: 'build_mastery', label: 'Build Mastery:', type: 'textarea' },
              { id: 'physical', label: 'PhysicaL illness: Did you treat physical illness, take meds?', type: 'radio', options: ['Yes', 'No', 'N/A'] },
              { id: 'eating', label: 'Eating: Did you eat balanced meals?', type: 'radio', options: ['Yes', 'No', 'Somewhat'] },
              { id: 'avoid', label: 'Avoid substances: Did you avoid alcohol/drugs?', type: 'radio', options: ['Yes', 'No'] },
              { id: 'sleep', label: 'Sleep: Did you get enough sleep?', type: 'radio', options: ['Yes', 'No'] },
              { id: 'exercise', label: 'Exercise: Did you get physical activity?', type: 'radio', options: ['Yes', 'No'] }
            ]
          }
        ];

        const DataStore = {
          getUsers: () => { const users = localStorage.getItem('dbt_users'); return users ? JSON.parse(users) : []; },
          getUser: (userId) => { const users = DataStore.getUsers(); return users.find(u => u.id === userId); },
          getUserByEmail: (email) => { const users = DataStore.getUsers(); return users.find(u => u.email.toLowerCase() === email.toLowerCase()); },
          addUser: (user) => { const users = DataStore.getUsers(); users.push(user); localStorage.setItem('dbt_users', JSON.stringify(users)); },
          updateUser: (userId, updates) => { const users = DataStore.getUsers(); const index = users.findIndex(u => u.id === userId); if (index !== -1) { users[index] = { ...users[index], ...updates, updatedAt: Date.now() }; localStorage.setItem('dbt_users', JSON.stringify(users)); return users[index]; } return null; },
          deleteUser: (userId) => { const users = DataStore.getUsers(); const filtered = users.filter(u => u.id !== userId); localStorage.setItem('dbt_users', JSON.stringify(filtered)); localStorage.removeItem(`dbt_skills_${userId}`); localStorage.removeItem(`dbt_worksheets_${userId}`); localStorage.removeItem(`dbt_safety_plan_${userId}`); localStorage.removeItem(`dbt_vulnerability_${userId}`); },
          getSkillEntries: (userId) => { const key = `dbt_skills_${userId}`; const entries = localStorage.getItem(key); return entries ? JSON.parse(entries) : []; },
          addSkillEntry: (entry) => { const key = `dbt_skills_${entry.userId}`; const entries = DataStore.getSkillEntries(entry.userId); entries.push(entry); localStorage.setItem(key, JSON.stringify(entries)); },
          deleteSkillEntry: (userId, entryId) => { const key = `dbt_skills_${userId}`; const entries = DataStore.getSkillEntries(userId); const filtered = entries.filter(e => e.id !== entryId); localStorage.setItem(key, JSON.stringify(filtered)); },
          getWorksheetSessions: (userId) => { const key = `dbt_worksheets_${userId}`; const sessions = localStorage.getItem(key); return sessions ? JSON.parse(sessions) : {}; },
          saveWorksheetSession: (userId, sessionId, sessionData) => { const key = `dbt_worksheets_${userId}`; const sessions = DataStore.getWorksheetSessions(userId); sessions[sessionId] = sessionData; localStorage.setItem(key, JSON.stringify(sessions)); },
          deleteWorksheetSession: (userId, sessionId) => { const key = `dbt_worksheets_${userId}`; const sessions = DataStore.getWorksheetSessions(userId); delete sessions[sessionId]; localStorage.setItem(key, JSON.stringify(sessions)); },
          getWorksheetResponses: (sessionId) => { const key = `dbt_worksheet_responses_${sessionId}`; const responses = localStorage.getItem(key); return responses ? JSON.parse(responses) : {}; },
          saveWorksheetResponse: (sessionId, fieldId, value) => { const key = `dbt_worksheet_responses_${sessionId}`; const responses = localStorage.getItem(key); const current = responses ? JSON.parse(responses) : {}; current[fieldId] = value; localStorage.setItem(key, JSON.stringify(current)); },
          getSafetyPlan: (userId) => { const key = `dbt_safety_plan_${userId}`; const plan = localStorage.getItem(key); return plan ? JSON.parse(plan) : null; },
          saveSafetyPlan: (plan) => { const key = `dbt_safety_plan_${plan.userId}`; localStorage.setItem(key, JSON.stringify(plan)); },
          getVulnerabilityEntries: (userId) => { const key = `dbt_vulnerability_${userId}`; const entries = localStorage.getItem(key); return entries ? JSON.parse(entries) : []; },
          addVulnerabilityEntry: (entry) => { const key = `dbt_vulnerability_${entry.userId}`; const entries = DataStore.getVulnerabilityEntries(entry.userId); entries.push(entry); localStorage.setItem(key, JSON.stringify(entries)); },
          deleteVulnerabilityEntry: (userId, entryId) => { const key = `dbt_vulnerability_${userId}`; const entries = DataStore.getVulnerabilityEntries(userId); const filtered = entries.filter(e => e.id !== entryId); localStorage.setItem(key, JSON.stringify(filtered)); },
          exportUserData: (userId) => { return { version: '1.9.3', exportDate: new Date().toISOString(), user: DataStore.getUser(userId), skillEntries: DataStore.getSkillEntries(userId), worksheetSessions: DataStore.getWorksheetSessions(userId), safetyPlan: DataStore.getSafetyPlan(userId), vulnerabilityEntries: DataStore.getVulnerabilityEntries(userId) }; }
        };

        window.DataStore = DataStore;
        window.DBT_MODULES = DBT_MODULES;
        window.SKILL_DEFINITIONS = SKILL_DEFINITIONS;
        window.WORKSHEET_DEFINITIONS = WORKSHEET_DEFINITIONS;

        // ==================== AUTH CONTEXT ====================

        const AuthContext = createContext();
        const useAuth = () => { const context = useContext(AuthContext); if (!context) { throw new Error('useAuth must be used within AuthProvider'); } return context; };

        const AuthProvider = ({ children }) => {
          const [currentUser, setCurrentUser] = useState(null);
          const [currentView, setCurrentView] = useState('home');
          const [viewData, setViewData] = useState(null);
          const [loading, setLoading] = useState(true);

          useEffect(() => { const sessionUser = localStorage.getItem('dbt_current_user'); if (sessionUser) { const user = JSON.parse(sessionUser); setCurrentUser(user); } setLoading(false); }, []);

          const login = (user) => { setCurrentUser(user); localStorage.setItem('dbt_current_user', JSON.stringify(user)); };
          const logout = () => { setCurrentUser(null); localStorage.removeItem('dbt_current_user'); setCurrentView('home'); setViewData(null); };
          const onNavigate = (view, data = null) => { setCurrentView(view); setViewData(data); window.scrollTo(0, 0); };

          const value = { currentUser, currentView, viewData, login, logout, onNavigate, loading };

          if (loading) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-50 to-blue-50">
                <div className="text-center"><div className="text-6xl mb-4">🧘</div><div className="text-2xl font-bold text-gray-700">Loading WiseMind...</div></div>
              </div>
            );
          }

          return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
        };

        window.useAuth = useAuth;

        // ==================== AUTH SCREEN ====================

        const EnhancedAuthScreen = () => {
          const { login } = useAuth();
          const [mode, setMode] = useState('login');
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [confirmPassword, setConfirmPassword] = useState('');
          const [name, setName] = useState('');
          const [error, setError] = useState('');
          const [loading, setLoading] = useState(false);
          const [agreedToPrivacy, setAgreedToPrivacy] = useState(false);

          const handleLogin = async (e) => {
            e.preventDefault();
            setError('');
            setLoading(true);
            try {
              const user = DataStore.getUserByEmail(email);
              if (!user) { setError('No account found with this email'); setLoading(false); return; }
              if (user.password !== password) { setError('Incorrect password'); setLoading(false); return; }
              login(user);
            } catch (err) { setError('Login failed'); setLoading(false); }
          };

          const handleSignup = async (e) => {
            e.preventDefault();
            setError('');
            if (!agreedToPrivacy) { setError('You must agree to the privacy notice'); return; }
            if (!name || !email || !password) { setError('Please fill in all fields'); return; }
            if (password.length < 8) { setError('Password must be at least 8 characters'); return; }
            if (password !== confirmPassword) { setError('Passwords do not match'); return; }
            setLoading(true);
            try {
              const existingUser = DataStore.getUserByEmail(email);
              if (existingUser) { setError('An account with this email already exists'); setLoading(false); return; }
              const newUser = { id: Date.now().toString(), email: email, password: password, name: name, createdAt: Date.now(), updatedAt: Date.now() };
              DataStore.addUser(newUser);
              login(newUser);
            } catch (err) { setError('Signup failed'); setLoading(false); }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                <div className="text-center mb-8">
                  <div className="text-6xl mb-4">🧘</div>
                  <h1 className="text-4xl font-bold mb-2 bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">WiseMind</h1>
                  <p className="text-gray-600">DBT Skills Tracker</p>
                </div>
                <div className="flex mb-6 bg-gray-100 rounded-lg p-1">
                  <button onClick={() => { setMode('login'); setError(''); }} className={`flex-1 py-2 rounded-lg font-semibold transition-all ${mode === 'login' ? 'bg-white text-purple-600 shadow' : 'text-gray-600'}`}>Login</button>
                  <button onClick={() => { setMode('signup'); setError(''); }} className={`flex-1 py-2 rounded-lg font-semibold transition-all ${mode === 'signup' ? 'bg-white text-purple-600 shadow' : 'text-gray-600'}`}>Sign Up</button>
                </div>
                {mode === 'login' ? (
                  <form onSubmit={handleLogin}>
                    <div className="mb-4"><label className="block text-gray-700 font-semibold mb-2">Email</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required /></div>
                    <div className="mb-4"><label className="block text-gray-700 font-semibold mb-2">Password</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required /></div>
                    {error && <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">{error}</div>}
                    <button type="submit" disabled={loading} className="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-3 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all disabled:opacity-50">{loading ? 'Logging in...' : 'Login'}</button>
                  </form>
                ) : (
                  <form onSubmit={handleSignup}>
                    <div className="mb-4"><label className="block text-gray-700 font-semibold mb-2">Name</label><input type="text" value={name} onChange={(e) => setName(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required /></div>
                    <div className="mb-4"><label className="block text-gray-700 font-semibold mb-2">Email</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required /></div>
                    <div className="mb-4"><label className="block text-gray-700 font-semibold mb-2">Password</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required /></div>
                    <div className="mb-4"><label className="block text-gray-700 font-semibold mb-2">Confirm Password</label><input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required /></div>
                    <div className="mb-4"><label className="flex items-start gap-2 cursor-pointer"><input type="checkbox" checked={agreedToPrivacy} onChange={(e) => setAgreedToPrivacy(e.target.checked)} className="mt-1" /><span className="text-sm text-gray-700">I understand data is stored locally</span></label></div>
                    {error && <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">{error}</div>}
                    <button type="submit" disabled={loading} className="w-full bg-gradient-to-r from-purple-500 to-blue-500 text-white py-3 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition-all disabled:opacity-50">{loading ? 'Creating Account...' : 'Sign Up'}</button>
                  </form>
                )}
                <div className="mt-6 text-center text-sm text-gray-600"><p>🔒 Your data stays on your device</p></div>
              </div>
            </div>
          );
        };

        // ==================== HOME ====================

        const Home = () => {
          const { currentUser, onNavigate } = useAuth();
          const [stats, setStats] = useState({ totalSkills: 0, totalWorksheets: 0, totalVulnerability: 0 });

          useEffect(() => {
            if (currentUser) {
              const skillEntries = DataStore.getSkillEntries(currentUser.id);
              const worksheetSessions = DataStore.getWorksheetSessions(currentUser.id);
              const vulnerabilityEntries = DataStore.getVulnerabilityEntries(currentUser.id);
              const completedWorksheets = Object.values(worksheetSessions).filter(s => s.status === 'completed');
              setStats({ totalSkills: skillEntries.length, totalWorksheets: completedWorksheets.length, totalVulnerability: vulnerabilityEntries.length });
            }
          }, [currentUser]);

          const quickActions = [
            { id: 'skill-log', label: 'Log a Skill', icon: '📝', color: 'purple' },
            { id: 'worksheets', label: 'Worksheets', icon: '📄', color: 'blue' },
            { id: 'learn', label: 'Learn Skills', icon: '📚', color: 'green' },
            { id: 'distress-mode', label: 'I Need Help Now', icon: '🆘', color: 'red' },
            { id: 'safety-plan', label: 'Safety Plan', icon: '🔒', color: 'orange' },
            { id: 'insights', label: 'Insights', icon: '📊', color: 'indigo' }
          ];

          return (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-blue-50 p-6">
              <div className="max-w-6xl mx-auto">
                <div className="mb-8">
                  <h1 className="text-4xl font-bold text-gray-800 mb-2">Welcome back, {currentUser.name || 'Friend'}! 👋</h1>
                  <p className="text-xl text-gray-600">Ready to practice your DBT skills today?</p>
                </div>
                <div className="grid md:grid-cols-3 gap-4 mb-8">
                  <div className="bg-white rounded-xl p-6 shadow-md text-center"><div className="text-4xl mb-2">📝</div><div className="text-3xl font-bold text-purple-600">{stats.totalSkills}</div><div className="text-gray-600 text-sm">Skills Logged</div></div>
                  <div className="bg-white rounded-xl p-6 shadow-md text-center"><div className="text-4xl mb-2">📄</div><div className="text-3xl font-bold text-blue-600">{stats.totalWorksheets}</div><div className="text-gray-600 text-sm">Worksheets Done</div></div>
                  <div className="bg-white rounded-xl p-6 shadow-md text-center"><div className="text-4xl mb-2">💪</div><div className="text-3xl font-bold text-green-600">{stats.totalVulnerability}</div><div className="text-gray-600 text-sm">ABC PLEASE Logs</div></div>
                </div>
                <div className="bg-white rounded-xl p-8 shadow-lg mb-8">
                  <h2 className="text-2xl font-bold text-gray-800 mb-6">Quick Actions</h2>
                  <div className="grid md:grid-cols-3 gap-4">
                    {quickActions.map((action) => (
                      <button key={action.id} onClick={() => onNavigate(action.id)} className={`bg-gradient-to-br from-${action.color}-50 to-${action.color}-100 border-2 border-${action.color}-300 rounded-xl p-6 hover:shadow-lg transition-all transform hover:scale-105`}>
                        <div className="text-5xl mb-3">{action.icon}</div>
                        <div className="font-semibold text-gray-800">{action.label}</div>
                      </button>
                    ))}
                  </div>
                </div>
                <div className="bg-gradient-to-r from-purple-500 to-blue-500 rounded-xl p-8 text-white shadow-lg">
                  <h2 className="text-2xl font-bold mb-3">💡 Today's Reminder</h2>
                  <p className="text-lg opacity-95">"You don't have to use skills perfectly. You just have to use them. Progress, not perfection."</p>
                </div>
              </div>
            </div>
          );
        };

        // ============ SKILL LOG (keeping same as before) ============
        
        const SkillLog = () => {
          const { currentUser } = useAuth();
          const [view, setView] = useState('list');
          const [entries, setEntries] = useState([]);
          const [formData, setFormData] = useState({
            date: new Date().toISOString().split('T')[0],
            module: '',
            skill: '',
            emotionBefore: 5,
            emotionAfter: 5,
            trigger: '',
            notes: '',
            helpfulness: 3
          });

          useEffect(() => { if (currentUser) { loadEntries(); } }, [currentUser]);

          const loadEntries = () => { if (!currentUser) return; const allEntries = DataStore.getSkillEntries(currentUser.id); setEntries(allEntries.sort((a, b) => new Date(b.date) - new Date(a.date))); };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const entry = { id: Date.now().toString(), userId: currentUser.id, ...formData, createdAt: Date.now() };
            DataStore.addSkillEntry(entry);
            loadEntries();
            setView('list');
            setFormData({ date: new Date().toISOString().split('T')[0], module: '', skill: '', emotionBefore: 5, emotionAfter: 5, trigger: '', notes: '', helpfulness: 3 });
          };

          const handleDelete = (id) => { if (confirm('Delete this entry?')) { DataStore.deleteSkillEntry(currentUser.id, id); loadEntries(); } };

          if (view === 'create') {
            return (

// ==================== WORKSHEET SESSION ====================
const WorksheetSession = ({ worksheetId, onBack }) => {
  const { currentUser } = useAuth();
  const worksheet = WORKSHEET_DEFINITIONS.find(w => w.id === worksheetId);
  const [currentStep, setCurrentStep] = React.useState(0);
  const [responses, setResponses] = React.useState({});
  const [session, setSession] = React.useState(null);

  React.useEffect(() => {
    if (currentUser) {
      const existingSession = DataStore.getWorksheetSession(currentUser.id, worksheetId);
      if (existingSession) {
        setSession(existingSession);
        setResponses(existingSession.responses || {});
        setCurrentStep(existingSession.currentStep || 0);
      } else {
        const newSession = {
          worksheetId,
          userId: currentUser.id,
          status: 'in_progress',
          startedAt: Date.now(),
          currentStep: 0,
          responses: {}
        };
        DataStore.saveWorksheetSession(newSession);
        setSession(newSession);
      }
    }
  }, [currentUser, worksheetId]);

  const handleResponseChange = (questionId, value) => {
    setResponses(prev => ({ ...prev, [questionId]: value }));
  };

  const handleNext = () => {
    if (currentStep < worksheet.questions.length - 1) {
      const updatedSession = { ...session, currentStep: currentStep + 1, responses, updatedAt: Date.now() };
      DataStore.saveWorksheetSession(updatedSession);
      setCurrentStep(currentStep + 1);
    }
  };

  const handlePrevious = () => {
    if (currentStep > 0) {
      setCurrentStep(currentStep - 1);
    }
  };

  const handleComplete = () => {
    const completedSession = { ...session, status: 'completed', responses, completedAt: Date.now(), updatedAt: Date.now() };
    DataStore.saveWorksheetSession(completedSession);
    alert('🎉 Worksheet completed! Great work!');
    onBack();
  };

  if (!worksheet || !session) return <div className="p-8 text-center">Loading...</div>;

  const currentQuestion = worksheet.questions[currentStep];
  const progress = ((currentStep + 1) / worksheet.questions.length) * 100;

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 p-6">
      <div className="max-w-3xl mx-auto">
        <button onClick={onBack} className="mb-6 flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
          ← Back to Worksheets
        </button>

        <div className="bg-white rounded-2xl shadow-xl p-8">
          <div className="mb-6">
            <div className="flex items-center justify-between mb-2">
              <h2 className="text-2xl font-bold text-gray-900">{worksheet.icon} {worksheet.name}</h2>
              <span className="text-sm text-gray-600">Step {currentStep + 1} of {worksheet.questions.length}</span>
            </div>
            <div className="w-full bg-gray-200 rounded-full h-2">
              <div className="bg-indigo-600 h-2 rounded-full transition-all duration-300" style={{width: `${progress}%`}}></div>
            </div>
          </div>

          <div className="mb-8">
            <h3 className="text-xl font-semibold text-gray-900 mb-4">{currentQuestion.question}</h3>
            {currentQuestion.help && (
              <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4">
                <p className="text-sm text-blue-800">{currentQuestion.help}</p>
              </div>
            )}

            {currentQuestion.type === 'textarea' && (
              <textarea value={responses[currentQuestion.id] || ''} onChange={(e) => handleResponseChange(currentQuestion.id, e.target.value)} className="w-full h-40 p-4 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none" placeholder="Type your response here..."></textarea>
            )}

            {currentQuestion.type === 'rating' && (
              <div className="space-y-4">
                <input type="range" min="0" max="10" value={responses[currentQuestion.id] || 5} onChange={(e) => handleResponseChange(currentQuestion.id, e.target.value)} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                <div className="flex justify-between text-sm text-gray-600">
                  <span>0 - Not at all</span>
                  <span className="text-2xl font-bold text-indigo-600">{responses[currentQuestion.id] || 5}</span>
                  <span>10 - Extremely</span>
                </div>
              </div>
            )}

            {currentQuestion.type === 'multiselect' && (
              <div className="space-y-2">
                {currentQuestion.options.map(option => {
                  const selectedOptions = responses[currentQuestion.id] || [];
                  const isSelected = selectedOptions.includes(option);
                  return (
                    <label key={option} className="flex items-center gap-3 p-3 border-2 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors" style={{borderColor: isSelected ? '#4f46e5' : '#e5e7eb', backgroundColor: isSelected ? '#eef2ff' : 'white'}}>
                      <input type="checkbox" checked={isSelected} onChange={(e) => {
                        const current = responses[currentQuestion.id] || [];
                        const updated = e.target.checked ? [...current, option] : current.filter(o => o !== option);
                        handleResponseChange(currentQuestion.id, updated);
                      }} className="w-5 h-5 text-indigo-600" />
                      <span className="text-gray-800">{option}</span>
                    </label>
                  );
                })}
              </div>
            )}

            {currentQuestion.type === 'checklist' && (
              <div className="space-y-3">
                {currentQuestion.items.map(item => {
                  const checkedItems = responses[currentQuestion.id] || {};
                  return (
                    <div key={item} className="flex items-start gap-3 p-3 border rounded-lg hover:bg-gray-50">
                      <input type="checkbox" checked={checkedItems[item] || false} onChange={(e) => {
                        const updated = { ...checkedItems, [item]: e.target.checked };
                        handleResponseChange(currentQuestion.id, updated);
                      }} className="w-5 h-5 text-indigo-600 mt-1" />
                      <span className="text-gray-800">{item}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div className="flex justify-between gap-4">
            <button onClick={handlePrevious} disabled={currentStep === 0} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
              Previous
            </button>
            {currentStep < worksheet.questions.length - 1 ? (
              <button onClick={handleNext} className="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
                Next
              </button>
            ) : (
              <button onClick={handleComplete} className="px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition-colors">
                Complete Worksheet
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

      { id: 'accepts', name: 'ACCEPTS', icon: '🎨', description: 'Activities, Contributing, Comparisons, Emotions, Pushing away, Thoughts, Sensations', whenToUse: 'When you need to distract from painful emotions temporarily', howTo: ['Activities: Do something engaging', 'Contributing: Help someone else', 'Comparisons: Compare to times you felt worse', 'Emotions: Create opposite emotions (funny videos)', 'Pushing away: Mentally push the situation away for now', 'Thoughts: Focus thoughts elsewhere (counting, puzzles)', 'Sensations: Create strong physical sensations'], example: 'Watch a funny movie when feeling depressed; do a puzzle when anxious' },

// ==================== SAFETY PLAN ====================
const SafetyPlan = ({ onNavigate }) => {
  const { currentUser } = useAuth();
  const [plan, setPlan] = React.useState({
    warningSignsInternal: '',
    warningSignsExternal: '',
    copingStrategies: '',
    socialDistractions: '',
    peopleWhoCanHelp: '',
    professionalsToContact: '',
    environmentSafety: '',
    reasonsForLiving: ''
  });
  const [saveStatus, setSaveStatus] = React.useState('');

  React.useEffect(() => {
    if (currentUser) {
      const saved = DataStore.getSafetyPlan(currentUser.id);
      if (saved) setPlan(saved);
    }
  }, [currentUser]);

  const handleSave = () => {
    if (!currentUser) return;
    setSaveStatus('saving');
    DataStore.saveSafetyPlan({ ...plan, userId: currentUser.id, updatedAt: Date.now() });
    setSaveStatus('saved');
    setTimeout(() => setSaveStatus(''), 3000);
  };

  const handleExport = () => {
    const planText = `MY SAFETY PLAN\nCreated: ${new Date().toLocaleDateString()}\n\nSTEP 1: WARNING SIGNS\nInternal: ${plan.warningSignsInternal || '(Not filled)'}\nExternal: ${plan.warningSignsExternal || '(Not filled)'}\n\nSTEP 2: COPING STRATEGIES\n${plan.copingStrategies || '(Not filled)'}\n\nSTEP 3: SOCIAL DISTRACTIONS\n${plan.socialDistractions || '(Not filled)'}\n\nSTEP 4: PEOPLE WHO CAN HELP\n${plan.peopleWhoCanHelp || '(Not filled)'}\n\nSTEP 5: PROFESSIONALS\n${plan.professionalsToContact || '(Not filled)'}\n\nSTEP 6: ENVIRONMENT SAFETY\n${plan.environmentSafety || '(Not filled)'}\n\nSTEP 7: REASONS FOR LIVING\n${plan.reasonsForLiving || '(Not filled)'}\n\nEMERGENCY CONTACTS\n988 - Suicide & Crisis Lifeline\n741741 - Crisis Text Line\n911 - Emergency Services`;
    const blob = new Blob([planText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `safety-plan-${new Date().toISOString().split('T')[0]}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const sections = [
    { key: 'warningSignsInternal', label: 'Step 1a: Internal Warning Signs', placeholder: 'Thoughts, images, mood, behaviors that show a crisis might be developing...' },
    { key: 'warningSignsExternal', label: 'Step 1b: External Warning Signs', placeholder: 'Situations, people, events, or circumstances that lead to crisis...' },
    { key: 'copingStrategies', label: 'Step 2: Coping Strategies', placeholder: 'Things I can do on my own to feel better (take a walk, listen to music, exercise)...' },
    { key: 'socialDistractions', label: 'Step 3: Social Distractions', placeholder: 'People and social settings that provide distraction (friends to call, places to go)...' },
    { key: 'peopleWhoCanHelp', label: 'Step 4: People Who Can Help', placeholder: 'People I can ask for help (friends, family, their phone numbers)...' },
    { key: 'professionalsToContact', label: 'Step 5: Professionals to Contact', placeholder: 'Mental health professionals, crisis services, their contact information...' },
    { key: 'environmentSafety', label: 'Step 6: Making Environment Safe', placeholder: 'How to reduce access to lethal means (remove pills, give away weapons, etc.)...' },
    { key: 'reasonsForLiving', label: 'Step 7: Reasons for Living', placeholder: 'What makes life worth living (people, pets, goals, values, hopes)...' }
  ];

  return (
    <div className="min-h-screen bg-gradient-to-br from-red-50 via-white to-orange-50 p-6">
      <div className="max-w-4xl mx-auto">
        <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-red-600 hover:text-red-800 font-medium transition-colors">
          ← Back to Home
        </button>

        <div className="bg-white rounded-2xl shadow-xl p-8 mb-8">
          <h1 className="text-4xl font-bold text-gray-900 mb-3">🛡️ Safety Plan</h1>
          <p className="text-gray-600 text-lg mb-6">A plan to keep yourself safe during a crisis</p>

          <div className="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
            <p className="text-red-800 font-semibold">⚠️ If you're in immediate danger, call 911 or go to your nearest emergency room.</p>
            <p className="text-red-700 mt-2">National Suicide Prevention Lifeline: <strong>988</strong> (call or text)</p>
          </div>

          <div className="space-y-6">
            {sections.map(section => (
              <div key={section.key}>
                <label className="block text-lg font-semibold text-gray-900 mb-2">{section.label}</label>
                <textarea value={plan[section.key]} onChange={(e) => setPlan({...plan, [section.key]: e.target.value})} placeholder={section.placeholder} className="w-full h-32 p-4 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none"></textarea>
              </div>
            ))}
          </div>

          <div className="flex gap-4 mt-8">
            <button onClick={handleSave} className="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
              {saveStatus === 'saving' ? 'Saving...' : saveStatus === 'saved' ? '✓ Saved!' : 'Save Safety Plan'}
            </button>
            <button onClick={handleExport} className="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg transition-colors">
              Export
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ==================== INSIGHTS & ANALYTICS ====================
const Insights = ({ onNavigate }) => {
  const { currentUser } = useAuth();
  const [entries, setEntries] = React.useState([]);
  const [timeRange, setTimeRange] = React.useState('30');

  React.useEffect(() => {
    if (currentUser) {
      setEntries(DataStore.getSkillEntries(currentUser.id) || []);
    }
  }, [currentUser]);

  const daysAgo = parseInt(timeRange);
  const cutoffDate = Date.now() - (daysAgo * 24 * 60 * 60 * 1000);
  const filteredEntries = entries.filter(e => e.timestamp >= cutoffDate);

  const totalEntries = filteredEntries.length;
  const avgEmotionBefore = filteredEntries.filter(e => e.emotionBefore).reduce((sum, e) => sum + e.emotionBefore, 0) / filteredEntries.filter(e => e.emotionBefore).length || 0;
  const avgEmotionAfter = filteredEntries.filter(e => e.emotionAfter).reduce((sum, e) => sum + e.emotionAfter, 0) / filteredEntries.filter(e => e.emotionAfter).length || 0;
  const avgHelpfulness = filteredEntries.filter(e => e.helpfulness).reduce((sum, e) => sum + e.helpfulness, 0) / filteredEntries.filter(e => e.helpfulness).length || 0;

  const moduleCount = {};
  filteredEntries.forEach(e => {
    if (e.module) moduleCount[e.module] = (moduleCount[e.module] || 0) + 1;
  });

  const skillCount = {};
  filteredEntries.forEach(e => {
    if (e.skill) skillCount[e.skill] = (skillCount[e.skill] || 0) + 1;
  });

  const topSkills = Object.entries(skillCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const topModules = Object.entries(moduleCount).sort((a, b) => b[1] - a[1]);

  return (
    <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-pink-50 p-6">
      <div className="max-w-6xl mx-auto">
        <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-purple-600 hover:text-purple-800 font-medium transition-colors">
          ← Back to Home
        </button>

        <div className="bg-white rounded-2xl shadow-xl p-8 mb-8">
          <h1 className="text-4xl font-bold text-gray-900 mb-3">📊 Insights & Analytics</h1>
          <p className="text-gray-600 text-lg mb-6">Track your progress and patterns</p>
          <select value={timeRange} onChange={(e) => setTimeRange(e.target.value)} className="px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none">
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="90">Last 90 days</option>
            <option value="365">Last year</option>
          </select>
        </div>

        {totalEntries === 0 ? (
          <div className="bg-white rounded-2xl shadow-xl p-12 text-center">
            <div className="text-6xl mb-4">📈</div>
            <h2 className="text-2xl font-bold text-gray-900 mb-3">No data yet</h2>
            <p className="text-gray-600 mb-6">Start logging skills to see your insights!</p>
            <button onClick={() => onNavigate('skill-log')} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
              Log Your First Skill
            </button>
          </div>
        ) : (
          <>
            <div className="grid md:grid-cols-4 gap-6 mb-8">
              <div className="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl shadow-xl p-6 text-white">
                <div className="text-3xl mb-2">📝</div>
                <div className="text-4xl font-bold mb-1">{totalEntries}</div>
                <div className="text-blue-100">Skills Logged</div>
              </div>
              <div className="bg-gradient-to-br from-green-500 to-green-600 rounded-2xl shadow-xl p-6 text-white">
                <div className="text-3xl mb-2">📉</div>
                <div className="text-4xl font-bold mb-1">{(avgEmotionBefore - avgEmotionAfter).toFixed(1)}</div>
                <div className="text-green-100">Avg Emotion Reduction</div>
              </div>
              <div className="bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl shadow-xl p-6 text-white">
                <div className="text-3xl mb-2">⭐</div>
                <div className="text-4xl font-bold mb-1">{avgHelpfulness.toFixed(1)}/5</div>
                <div className="text-purple-100">Avg Helpfulness</div>
              </div>
              <div className="bg-gradient-to-br from-orange-500 to-orange-600 rounded-2xl shadow-xl p-6 text-white">
                <div className="text-3xl mb-2">🔥</div>
                <div className="text-4xl font-bold mb-1">{Math.ceil(totalEntries / daysAgo)}</div>
                <div className="text-orange-100">Skills per Day</div>
              </div>
            </div>

            <div className="grid md:grid-cols-2 gap-8">
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-2xl font-bold text-gray-900 mb-6">Most Used Skills</h2>
                <div className="space-y-4">
                  {topSkills.map(([skill, count], idx) => (
                    <div key={idx}>
                      <div className="flex justify-between mb-2">
                        <span className="font-semibold text-gray-900">{skill}</span>
                        <span className="text-purple-600 font-bold">{count}</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-3">
                        <div className="bg-gradient-to-r from-purple-500 to-pink-500 h-3 rounded-full" style={{width: `${(count / topSkills[0][1]) * 100}%`}}></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-2xl font-bold text-gray-900 mb-6">Skills by Module</h2>
                <div className="space-y-4">
                  {topModules.map(([module, count], idx) => (
                    <div key={idx}>
                      <div className="flex justify-between mb-2">
                        <span className="font-semibold text-gray-900">{module}</span>
                        <span className="text-blue-600 font-bold">{count}</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-3">
                        <div className="bg-gradient-to-r from-blue-500 to-cyan-500 h-3 rounded-full" style={{width: `${(count / totalEntries) * 100}%`}}></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ==================== SETTINGS ====================
const Settings = ({ onNavigate }) => {
  const { currentUser, logout } = useAuth();
  const [exportStatus, setExportStatus] = React.useState('');

  const handleExport = () => {
    if (!currentUser) return;
    setExportStatus('exporting');
    const data = {
      user: DataStore.getUser(currentUser.id),
      skillEntries: DataStore.getSkillEntries(currentUser.id),
      worksheetSessions: DataStore.getWorksheetSessions(currentUser.id),
      safetyPlan: DataStore.getSafetyPlan(currentUser.id),
      vulnerabilityEntries: DataStore.getVulnerabilityEntries(currentUser.id),
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `wisemind-data-${currentUser.username}-${Date.now()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setExportStatus('exported');
    setTimeout(() => setExportStatus(''), 3000);
  };

  const handleDeleteAccount = () => {
    if (confirm('Are you sure you want to delete your account? This cannot be undone.')) {
      if (confirm('This will permanently delete all your data. Are you absolutely sure?')) {
        DataStore.deleteUser(currentUser.id);
        logout();
      }
    }
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-blue-50 p-6">
      <div className="max-w-3xl mx-auto">
        <button onClick={() => onNavigate('home')} className="mb-6 flex items-center gap-2 text-blue-600 hover:text-blue-800 font-medium transition-colors">
          ← Back to Home
        </button>

        <div className="bg-white rounded-2xl shadow-xl p-8 mb-6">
          <h1 className="text-4xl font-bold text-gray-900 mb-3">⚙️ Settings</h1>
          <p className="text-gray-600">Manage your account and data</p>
        </div>

        <div className="space-y-6">
          <div className="bg-white rounded-xl shadow-lg p-6">
            <h2 className="text-2xl font-bold text-gray-900 mb-4">Account</h2>
            <div className="space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-gray-700">Username:</span>
                <span className="font-semibold text-gray-900">{currentUser?.username}</span>
              </div>
              <div className="flex justify-between items-center">
                <span className="text-gray-700">Account created:</span>
                <span className="font-semibold text-gray-900">{new Date(currentUser?.createdAt).toLocaleDateString()}</span>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-lg p-6">
            <h2 className="text-2xl font-bold text-gray-900 mb-4">Data Management</h2>
            <button onClick={handleExport} className="w-full mb-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
              {exportStatus === 'exporting' ? 'Exporting...' : exportStatus === 'exported' ? '✓ Exported!' : 'Export All Data (JSON)'}
            </button>
            <p className="text-sm text-gray-600 mb-4">Download all your data in JSON format for backup or transfer.</p>
          </div>

          <div className="bg-white rounded-xl shadow-lg p-6">
            <h2 className="text-2xl font-bold text-gray-900 mb-4">About</h2>
            <div className="space-y-2 text-gray-700">
              <p><strong>WiseMind DBT Skills Tracker</strong></p>
              <p>Version 1.9.3</p>
              <p className="text-sm">All data is stored locally in your browser. No data is sent to any server.</p>
            </div>
            <div className="mt-4 space-y-2">
              <button onClick={() => onNavigate('privacy')} className="w-full text-left text-blue-600 hover:text-blue-800 font-semibold">
                → Privacy Notice
              </button>
              <button onClick={() => onNavigate('about')} className="w-full text-left text-blue-600 hover:text-blue-800 font-semibold">
                → About This App
              </button>
            </div>
          </div>

          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-6">
            <h2 className="text-2xl font-bold text-red-900 mb-4">Danger Zone</h2>
            <button onClick={handleDeleteAccount} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
              Delete Account
            </button>
            <p className="text-sm text-red-700 mt-3">This will permanently delete all your data. This action cannot be undone.</p>
          </div>

          <div className="text-center">
            <button onClick={logout} className="text-gray-600 hover:text-gray-800 font-semibold">
              Log Out
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ==================== PRIVACY NOTICE ====================
const PrivacyNotice = ({ onNavigate }) => {
  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50 p-6">
      <div className="max-w-4xl mx-auto">
        <button onClick={() => onNavigate('settings')} className="mb-6 flex items-center gap-2 text-blue-600 hover:text-blue-800 font-medium transition-colors">
          ← Back to Settings
        </button>
        <div className="bg-white rounded-2xl shadow-xl p-8">
          <h1 className="text-4xl font-bold text-gray-900 mb-8">🔒 Privacy Notice</h1>
          <div className="prose prose-lg max-w-none space-y-6 text-gray-700">
            <p className="text-sm text-gray-600"><strong>Last Updated:</strong> January 2024</p>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Your Privacy Matters</h2>
              <p>WiseMind is designed with your privacy as the top priority. Unlike most apps, <strong>WiseMind stores absolutely no data on any server</strong>. Everything you enter stays on your device.</p>
            </section>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Local Storage Only</h2>
              <p>All your data (skill logs, worksheets, safety plans, etc.) is stored exclusively in your browser's local storage. This means:</p>
              <ul className="list-disc pl-6 space-y-2">
                <li>Your data never leaves your device</li>
                <li>No one (including us) can access your information</li>
                <li>Your data is private by default</li>
              </ul>
              <div className="bg-yellow-50 border-l-4 border-yellow-500 p-4 my-4">
                <p className="text-yellow-800"><strong>⚠️ Important:</strong> If you clear your browser data or uninstall your browser, your WiseMind data will be lost. Always export backups regularly!</p>
              </div>
            </section>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">What We DON'T Collect</h2>
              <ul className="list-disc pl-6 space-y-2">
                <li>No tracking cookies</li>
                <li>No analytics</li>
                <li>No server communication</li>
                <li>No third-party data sharing</li>
                <li>No location data</li>
                <li>No email addresses (unless you choose to use one as a username)</li>
              </ul>
            </section>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Your Rights</h2>
              <p><strong>You have complete control:</strong></p>
              <ul className="list-disc pl-6 space-y-2">
                <li>Export your data anytime (Settings → Export Data)</li>
                <li>Delete your account and all data anytime</li>
                <li>Your data belongs to you, always</li>
              </ul>
            </section>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Important Limitations</h2>
              <ul className="list-disc pl-6 space-y-2">
                <li><strong>Not a substitute for professional care:</strong> WiseMind is a self-help tool, not a replacement for therapy or medical treatment</li>
                <li><strong>Emergency situations:</strong> In a crisis, call 988 (Suicide & Crisis Lifeline) or 911</li>
                <li><strong>Data persistence:</strong> Data only exists on your current browser/device</li>
              </ul>
            </section>
            <div className="bg-blue-50 border-l-4 border-blue-500 p-4 my-6">
              <p className="text-blue-800"><strong>Questions?</strong> This is an open-source project. You can inspect the code to verify these privacy claims.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ==================== ABOUT PAGE ====================
const AboutPage = ({ onNavigate }) => {
  return (
    <div className="min-h-screen bg-gradient-to-br from-green-50 via-white to-blue-50 p-6">
      <div className="max-w-4xl mx-auto">
        <button onClick={() => onNavigate('settings')} className="mb-6 flex items-center gap-2 text-green-600 hover:text-green-800 font-medium transition-colors">
          ← Back to Settings
        </button>
        <div className="bg-white rounded-2xl shadow-xl p-8">
          <h1 className="text-4xl font-bold text-gray-900 mb-8">💚 About WiseMind</h1>
          <div className="prose prose-lg max-w-none space-y-6 text-gray-700">
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Our Mission</h2>
              <p>WiseMind exists to make Dialectical Behavior Therapy (DBT) skills accessible, practical, and easy to track for everyone who wants to improve their emotional wellbeing.</p>
            </section>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Why This App Exists</h2>
              <p>DBT is one of the most effective therapies for emotional regulation, but practicing skills consistently is hard. WiseMind helps you:</p>
              <ul className="list-disc pl-6 space-y-2">
                <li>Remember which skills to use when</li>
                <li>Track what works for you</li>
                <li>See your progress over time</li>
                <li>Have resources available in crisis moments</li>
              </ul>
            </section>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Design Principles</h2>
              <ul className="list-disc pl-6 space-y-2">
                <li><strong>Privacy First:</strong> All data stays on your device, always</li>
                <li><strong>No Barriers:</strong> Free, no account required (username only)</li>
                <li><strong>Evidence-Based:</strong> Built on actual DBT curriculum</li>
                <li><strong>Simple & Beautiful:</strong> Easy to use when you're struggling</li>
              </ul>
            </section>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">What Makes Us Different</h2>
              <p>Unlike other mental health apps:</p>
              <ul className="list-disc pl-6 space-y-2">
                <li>✅ Completely free, no subscriptions</li>
                <li>✅ No data collection or tracking</li>
                <li>✅ Works offline (after first load)</li>
                <li>✅ No ads, ever</li>
                <li>✅ Open source - you can verify everything</li>
              </ul>
            </section>
            <div className="bg-red-50 border-l-4 border-red-500 p-4 my-6">
              <h3 className="text-xl font-bold text-red-900 mb-2">⚠️ Important Disclaimer</h3>
              <p className="text-red-800">WiseMind is a self-help tool, not a replacement for professional mental health care. If you're in crisis, please:</p>
              <ul className="list-disc pl-6 mt-2 text-red-800">
                <li>Call 988 (Suicide & Crisis Lifeline)</li>
                <li>Text HOME to 741741 (Crisis Text Line)</li>
                <li>Call 911 or go to your nearest emergency room</li>

            </div>
            <section>
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Version</h2>
              <p><strong>WiseMind v1.9.3</strong></p>
              <p className="text-sm text-gray-600">Single-file edition</p>
            </section>
            <section className="bg-gradient-to-r from-green-50 to-blue-50 p-6 rounded-xl">
              <h2 className="text-2xl font-bold text-gray-900 mb-3">Thank You</h2>
              <p>Thank you for using WiseMind. Your commitment to learning and practicing these skills is incredibly meaningful. Recovery is possible, and you're taking real steps toward it.</p>
              <p className="mt-4">💚 You've got this.</p>
            </section>
          </div>
        </div>
      </div>
    </div>

// ==================== MAIN APP ====================
const App = () => {
  return (
    <AuthProvider>
      <AppContent />
    </AuthProvider>
  );
};

const AppContent = () => {
  const { currentUser, isLoading, navigate, currentView, navigationData } = useAuth();

  if (isLoading) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 flex items-center justify-center">
        <div className="text-center">
          <div className="text-6xl mb-4 animate-bounce">🧠</div>
          <h2 className="text-2xl font-bold text-gray-900">Loading WiseMind...</h2>
        </div>
      </div>
    );
  }

  if (!currentUser) {
    return <EnhancedAuthScreen />;
  }

  const views = {
    'home': <Home onNavigate={navigate} />,
    'skill-log': <SkillLog onNavigate={navigate} navigationData={navigationData} />,
    'worksheets': <Worksheets onNavigate={navigate} />,
    'insights': <Insights onNavigate={navigate} />,
    'distress': <DistressMode onNavigate={navigate} />,
    'learn': <Learn onNavigate={navigate} />,
    'safety-plan': <SafetyPlan onNavigate={navigate} />,
    'track-vulnerability': <TrackVulnerability onNavigate={navigate} />,
    'settings': <Settings onNavigate={navigate} />,
    'privacy': <PrivacyNotice onNavigate={navigate} />,
    'about': <AboutPage onNavigate={navigate} />
  };

  return views[currentView] || views['home'];
};

// ==================== RENDER APP ====================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
